<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 字母捕手 Letter Catcher!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0c29;
    --star1: #ff6b6b;
    --star2: #ffd93d;
    --star3: #6bcb77;
    --star4: #4d96ff;
    --star5: #c77dff;
    --card: rgba(255,255,255,0.08);
    --glow: #ffd93d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Twinkling stars bg ── */
  .stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star-dot {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.4); }
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 18px 0 8px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    animation: shimmer 3s linear infinite;
    background-size: 200%;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

  /* ── Score bar ── */
  .score-bar {
    position: relative; z-index: 10;
    display: flex; gap: 20px; align-items: center;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    padding: 8px 28px;
    margin: 6px 0 14px;
    backdrop-filter: blur(8px);
  }
  .score-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 1.1rem; font-weight: 900; color: white;
  }
  .score-item span { font-size: 1.4rem; }
  #score-val { color: #ffd93d; font-size: 1.4rem; }
  #streak-val { color: #6bcb77; font-size: 1.4rem; }

  /* ── Mode selector ── */
  .mode-bar {
    position: relative; z-index: 10;
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .mode-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem; padding: 7px 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 30px; background: transparent;
    color: rgba(255,255,255,0.6); cursor: pointer;
    transition: all 0.25s;
  }
  .mode-btn.active, .mode-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: #ffd93d; color: #ffd93d;
    transform: scale(1.08);
  }

  /* ── Arena ── */
  .arena {
    position: relative; z-index: 10;
    width: min(420px, 95vw);
    aspect-ratio: 1 / 1.05;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 32px;
    backdrop-filter: blur(12px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(100,100,255,0.15);
  }

  /* ── Character ── */
  .character {
    font-size: 4rem;
    animation: float 2.5s ease-in-out infinite;
    filter: drop-shadow(0 4px 12px rgba(255,217,61,0.5));
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-12px) rotate(3deg); }
  }
  .character.correct { animation: cheer 0.6s ease; }
  @keyframes cheer {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.6) rotate(-10deg); }
    60%  { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .character.wrong { animation: shake 0.5s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-10px); }
    40%     { transform: translateX(10px); }
    60%     { transform: translateX(-8px); }
    80%     { transform: translateX(8px); }
  }

  /* ── Speech bubble ── */
  .bubble {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 0.95rem; font-weight: 700; color: rgba(255,255,255,0.8);
    min-height: 34px; text-align: center;
    transition: all 0.3s;
  }

  /* ── Letter display ── */
  .letter-display {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(5rem, 18vw, 9rem);
    line-height: 1;
    color: white;
    text-shadow: 0 0 40px currentColor;
    animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    cursor: default;
    user-select: none;
    position: relative;
  }
  @keyframes pop-in {
    from { transform: scale(0.2) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
  }
  .letter-display.correct-flash { animation: correct-flash 0.5s ease; }
  @keyframes correct-flash {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.3); filter: brightness(2); }
    100% { transform: scale(0) rotate(20deg); opacity: 0; }
  }
  .letter-display.wrong-flash { animation: wrong-flash 0.4s ease; }
  @keyframes wrong-flash {
    0%,100% { transform: translateX(0); color: white; }
    25%     { transform: translateX(-8px); color: #ff6b6b; }
    75%     { transform: translateX(8px);  color: #ff6b6b; }
  }

  /* case tag */
  .case-tag {
    font-size: 0.85rem; font-weight: 900;
    letter-spacing: 2px;
    padding: 4px 14px;
    border-radius: 20px;
    color: white;
  }
  .case-tag.upper { background: linear-gradient(90deg,#ff6b6b,#ff9a3c); }
  .case-tag.lower { background: linear-gradient(90deg,#4d96ff,#6bcb77); }

  /* ── Hint key ── */
  .hint-key {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.9rem; color: rgba(255,255,255,0.5); font-weight: 700;
  }
  .key-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.3);
    border-bottom: 4px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem; color: white;
    transition: all 0.15s;
  }
  .key-badge.press { transform: translateY(2px); border-bottom-width: 2px; background: rgba(255,255,255,0.25); }

  /* ── Progress stars ── */
  .progress-stars {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    max-width: 300px;
  }
  .prog-star {
    font-size: 1.2rem;
    filter: grayscale(1) opacity(0.4);
    transition: all 0.3s;
    animation: none;
  }
  .prog-star.lit {
    filter: none;
    animation: star-pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes star-pop {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }

  /* ── Confetti canvas ── */
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 20; }

  /* ── Combo message ── */
  .combo-msg {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem,8vw,4rem);
    color: #ffd93d;
    text-shadow: 0 0 30px #ff9a3c;
    z-index: 30;
    pointer-events: none;
    animation: combo-anim 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes combo-anim {
    0%   { opacity:0; transform: translate(-50%,-50%) scale(0.3) rotate(-15deg); }
    30%  { opacity:1; transform: translate(-50%,-50%) scale(1.1) rotate(5deg); }
    70%  { opacity:1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity:0; transform: translate(-50%,-80%) scale(0.8); }
  }

  /* ── Start overlay ── */
  #start-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
  }
  #start-overlay h2 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 7vw, 3.5rem);
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; background-size: 200%;
    animation: shimmer 2s linear infinite;
    text-align: center;
  }
  #start-overlay p {
    color: rgba(255,255,255,0.7); font-size: 1.1rem; text-align: center;
    max-width: 320px; line-height: 1.6;
  }
  .start-char { font-size: 5rem; animation: float 2s ease-in-out infinite; }
  .start-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem; padding: 14px 44px;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d);
    border: none; border-radius: 50px; color: #1a1a2e;
    cursor: pointer; box-shadow: 0 8px 30px rgba(255,107,107,0.5);
    transition: all 0.2s; margin-top: 8px;
    animation: pulse-btn 1.5s ease-in-out infinite;
  }
  .start-btn:hover { transform: scale(1.08); }
  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 8px 30px rgba(255,107,107,0.5); }
    50%     { box-shadow: 0 8px 50px rgba(255,107,107,0.9); }
  }

  /* level complete */
  #level-complete {
    display: none;
    position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center;
  }
  #level-complete.show { display: flex; }
  .complete-card {
    background: linear-gradient(135deg,#302b63,#24243e);
    border: 2px solid rgba(255,217,61,0.4);
    border-radius: 28px;
    padding: 36px 48px;
    text-align: center;
    box-shadow: 0 20px 80px rgba(0,0,0,0.5);
    animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .complete-card h2 { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#ffd93d; margin-bottom:8px; }
  .complete-card p  { color:rgba(255,255,255,0.7); font-size:1rem; margin-bottom:20px; }
  .complete-card .big-star { font-size: 3.5rem; }
  .next-btn {
    font-family:'Fredoka One',cursive; font-size:1.2rem;
    padding: 12px 36px; background: linear-gradient(135deg,#6bcb77,#4d96ff);
    border: none; border-radius: 40px; color: white; cursor: pointer;
    box-shadow: 0 6px 20px rgba(77,150,255,0.4); transition: transform 0.2s;
  }
  .next-btn:hover { transform: scale(1.07); }
</style>
</head>
<body>

<!-- Twinkling background -->
<div class="stars-bg" id="stars-bg"></div>

<!-- Confetti canvas -->
<canvas id="confetti"></canvas>

<!-- Start Screen -->
<div id="start-overlay">
  <div class="start-char">🚀</div>
  <h2>🌟 字母捕手 🌟</h2>
  <p>看屏幕上显示的字母，<br>找到键盘上对应的键，<br>快快按下去吧！</p>
  <p style="color:#ffd93d;font-weight:900;font-size:1.05rem;">大写 Aa ~ Zz 全都要认识哦！</p>
  <button class="start-btn" onclick="startGame()">🎮 开始游戏！</button>
</div>

<!-- Level Complete -->
<div id="level-complete">
  <div class="complete-card">
    <div class="big-star">🏆</div>
    <h2>太棒了！</h2>
    <p id="complete-msg">你打完了所有字母！<br>得了 <strong id="final-score" style="color:#ffd93d"></strong> 颗星！</p>
    <button class="next-btn" onclick="nextRound()">再来一轮 🚀</button>
  </div>
</div>

<!-- Header -->
<header><h1>🌟 字母捕手 Letter Catcher!</h1></header>

<!-- Score bar -->
<div class="score-bar">
  <div class="score-item"><span>⭐</span> 得分: <span id="score-val">0</span></div>
  <div class="score-item"><span>🔥</span> 连击: <span id="streak-val">0</span></div>
</div>

<!-- Mode selector -->
<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('both')" id="mode-both">大+小写</button>
  <button class="mode-btn" onclick="setMode('upper')" id="mode-upper">大写 ABC</button>
  <button class="mode-btn" onclick="setMode('lower')" id="mode-lower">小写 abc</button>
</div>

<!-- Arena -->
<div class="arena">
  <div class="character" id="char">🐱</div>
  <div class="bubble" id="bubble">按下键盘上的字母吧！</div>
  <div class="letter-display" id="letter-display" style="color:#ffd93d">A</div>
  <div class="case-tag upper" id="case-tag">大 写</div>
  <div class="hint-key">
    <span>按键盘上的</span>
    <div class="key-badge" id="key-badge">A</div>
  </div>
  <div class="progress-stars" id="progress-stars"></div>
</div>

<script>
// ── Stars background ──
(function(){
  const bg = document.getElementById('stars-bg');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className='star-dot';
    const sz = Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
    bg.appendChild(s);
  }
})();

// ── Game state ──
const CHARS = ['🐱','🐶','🦊','🐸','🐼','🦄','🐧','🦋','🐙','🦖'];
const BUBBLES_CORRECT = ['太棒了！⭐','你真厉害！🎉','继续加油！🔥','厉害厉害！✨','完美！🌟','棒极了！🎊','对了！🥳'];
const BUBBLES_WRONG   = ['再试一次！😊','仔细看看！👀','找一找！🔍','加油！💪'];
let score=0, streak=0, mode='both', currentLetter='', charIdx=0;
let totalRound=0, correctInRound=0;
let roundLetters=[], roundIndex=0;
const ROUND_SIZE=26;

function buildRound(){
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  // shuffle
  for(let i=letters.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [letters[i],letters[j]]=[letters[j],letters[i]];
  }
  roundLetters=letters; roundIndex=0;
  buildProgressStars();
}

function buildProgressStars(){
  const el=document.getElementById('progress-stars');
  el.innerHTML='';
  for(let i=0;i<ROUND_SIZE;i++){
    const s=document.createElement('span');
    s.className='prog-star'; s.textContent='⭐'; s.id='ps-'+i;
    el.appendChild(s);
  }
}

function nextLetter(){
  if(roundIndex>=ROUND_SIZE){ showLevelComplete(); return; }
  const base = roundLetters[roundIndex];
  let display;
  if(mode==='upper') display=base.toUpperCase();
  else if(mode==='lower') display=base.toLowerCase();
  else display = Math.random()<0.5 ? base.toUpperCase() : base.toLowerCase();
  currentLetter=display;

  const ld=document.getElementById('letter-display');
  const ct=document.getElementById('case-tag');
  const kb=document.getElementById('key-badge');

  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9a3c','#ff84ab'];
  ld.style.color=colors[Math.floor(Math.random()*colors.length)];
  ld.textContent=display;
  ld.style.animation='none'; ld.offsetWidth; ld.style.animation='pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both';

  const isUpper = display===display.toUpperCase();
  ct.textContent=isUpper?'大 写':'小 写';
  ct.className='case-tag '+(isUpper?'upper':'lower');

  // key badge shows both
  kb.textContent=base.toUpperCase();

  setBubble('按下键盘上的字母吧！', false);
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+m).classList.add('active');
  buildRound(); nextLetter();
}

function startGame(){
  document.getElementById('start-overlay').style.display='none';
  buildRound(); nextLetter();
  document.addEventListener('keydown', onKey);
}

function onKey(e){
  if(e.repeat) return;
  const pressed = e.key.toUpperCase();
  if(!/^[A-Z]$/.test(pressed)) return;

  const expected = currentLetter.toUpperCase();
  const kb = document.getElementById('key-badge');
  kb.classList.add('press'); setTimeout(()=>kb.classList.remove('press'),150);

  if(pressed===expected){
    handleCorrect();
  } else {
    handleWrong();
  }
}

function handleCorrect(){
  score++; streak++;
  document.getElementById('score-val').textContent=score;
  document.getElementById('streak-val').textContent=streak;

  // light up progress star
  const ps=document.getElementById('ps-'+roundIndex);
  if(ps){ ps.classList.add('lit'); }

  const ld=document.getElementById('letter-display');
  ld.classList.remove('correct-flash'); ld.offsetWidth; ld.classList.add('correct-flash');

  const ch=document.getElementById('char');
  ch.classList.remove('correct'); ch.offsetWidth; ch.classList.add('correct');
  ch.textContent=CHARS[Math.floor(Math.random()*CHARS.length)];

  setBubble(BUBBLES_CORRECT[Math.floor(Math.random()*BUBBLES_CORRECT.length)], true);
  launchConfetti(12);
  playBeep(true);
  speakLetter(currentLetter); // 🔊 朗读字母

  if(streak%3===0 && streak>0) showCombo(streak);

  roundIndex++;
  setTimeout(nextLetter, 520);
}

function handleWrong(){
  streak=0;
  document.getElementById('streak-val').textContent=0;

  const ld=document.getElementById('letter-display');
  ld.classList.remove('wrong-flash'); ld.offsetWidth; ld.classList.add('wrong-flash');

  const ch=document.getElementById('char');
  ch.classList.remove('wrong'); ch.offsetWidth; ch.classList.add('wrong');

  setBubble(BUBBLES_WRONG[Math.floor(Math.random()*BUBBLES_WRONG.length)], false);
  playBeep(false);
}

function setBubble(msg, good){
  const b=document.getElementById('bubble');
  b.textContent=msg;
  b.style.color = good ? '#6bcb77' : '#ff9a3c';
}

function showLevelComplete(){
  document.getElementById('final-score').textContent=score;
  document.getElementById('level-complete').classList.add('show');
}
function nextRound(){
  document.getElementById('level-complete').classList.remove('show');
  score=0; streak=0;
  document.getElementById('score-val').textContent=0;
  document.getElementById('streak-val').textContent=0;
  buildRound(); nextLetter();
}

// ── Combo message ──
function showCombo(n){
  const msgs={3:'连击 x3 🔥',6:'超级连击！⚡',9:'无敌！👑',12:'传说！🌈',15:'无法阻挡！💫'};
  const msg = msgs[Math.min(n, Object.keys(msgs).map(Number).filter(k=>k<=n).pop()||3)];
  const el=document.createElement('div');
  el.className='combo-msg'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

// ── Confetti ──
const canvas=document.getElementById('confetti');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

let particles=[];
function launchConfetti(n){
  const x=window.innerWidth/2, y=window.innerHeight*0.45;
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9a3c'];
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*14,
      vy:-(Math.random()*12+4),
      color:colors[Math.floor(Math.random()*colors.length)],
      size:Math.random()*8+4,
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*10,
      life:1, decay:0.02+Math.random()*0.01
    });
  }
  if(!confettiRunning) animConfetti();
}
let confettiRunning=false;
function animConfetti(){
  confettiRunning=true;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.4;
    p.rot+=p.rotV; p.life-=p.decay;
    ctx.save();
    ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    ctx.restore();
  });
  if(particles.length>0) requestAnimationFrame(animConfetti);
  else { confettiRunning=false; ctx.clearRect(0,0,canvas.width,canvas.height); }
}

// ── Sound: beep ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function playBeep(correct){
  if(!actx) actx=new AudioCtx();
  const osc=actx.createOscillator();
  const gain=actx.createGain();
  osc.connect(gain); gain.connect(actx.destination);
  if(correct){
    osc.frequency.setValueAtTime(520,actx.currentTime);
    osc.frequency.setValueAtTime(780,actx.currentTime+0.08);
    osc.frequency.setValueAtTime(1040,actx.currentTime+0.16);
    gain.gain.setValueAtTime(0.3,actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.5);
    osc.start(); osc.stop(actx.currentTime+0.5);
  } else {
    osc.frequency.setValueAtTime(220,actx.currentTime);
    osc.frequency.setValueAtTime(180,actx.currentTime+0.1);
    gain.gain.setValueAtTime(0.2,actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.35);
    osc.start(); osc.stop(actx.currentTime+0.35);
  }
}

// ── Speech: speak the letter name ──
// Pre-pick an English voice on load for best pronunciation
let enVoice = null;
function initVoice(){
  const voices = speechSynthesis.getVoices();
  // Prefer child-friendly / clear English voices
  const preferred = ['Samantha','Karen','Daniel','Google US English','Google UK English Female','Microsoft Zira'];
  enVoice = preferred.reduce((found, name) =>
    found || voices.find(v => v.name.includes(name) && v.lang.startsWith('en')), null)
    || voices.find(v => v.lang.startsWith('en-'))
    || voices[0];
}
speechSynthesis.onvoiceschanged = initVoice;
initVoice();

function speakLetter(letter){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel(); // cut off any previous speech instantly
  const utter = new SpeechSynthesisUtterance(letter.toUpperCase());
  utter.lang  = 'en-US';
  utter.rate  = 0.85;   // a bit slower = clearer for kids
  utter.pitch = 1.3;    // slightly higher = friendlier
  utter.volume = 1;
  if(enVoice) utter.voice = enVoice;
  speechSynthesis.speak(utter);
}
