<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>战战加减综合练习</title>
<style>
  :root{
    --bg:#eef3fb; --panel:#ffffff; --ink:#1f2430; --muted:#6b7280;
    --line:#d7dbe2; --brand:#2f6fed; --brand2:#06b6d4; --soft:#eaf1ff;
    --ok:#1f9d55; --okbg:#e7f7ee; --bad:#e03131; --badbg:#ffecec; --gold:#f59e0b;
  }
  html[data-theme="dark"]{
    --bg:#141821; --panel:#1e232d; --ink:#e6e9ef; --muted:#9aa2b1;
    --line:#333a47; --brand:#5b8cff; --brand2:#22d3ee; --soft:#22304d;
    --ok:#3fbf6d; --okbg:#16311f; --bad:#ff6b6b; --badbg:#3a1c1c; --gold:#fbbf24;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",Roboto,sans-serif;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;user-select:none;}
  .wrap{max-width:560px;margin:0 auto;padding:12px 14px 40px;}

  /* 顶栏 */
  .topbar{display:flex;align-items:center;gap:10px;margin:6px 2px 14px;}
  .topbar h1{font-size:18px;margin:0;flex:1;}
  .tbtn{font-size:14px;padding:8px 12px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);cursor:pointer;}
  .tbtn:active{transform:scale(.96);}

  /* 设置（默认收起）*/
  #settings{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:16px;}
  .grp{font-size:12px;color:var(--muted);margin:2px 0 8px;letter-spacing:.4px;}
  .types{display:flex;flex-wrap:wrap;gap:8px 14px;background:var(--soft);border-radius:10px;padding:10px 12px;margin-bottom:12px;}
  .chk{display:flex;align-items:center;gap:7px;font-size:14px;cursor:pointer;}
  .chk input{width:18px;height:18px;accent-color:var(--brand);}
  .frow{display:flex;flex-wrap:wrap;gap:12px 18px;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:12px;color:var(--muted);}
  .field input,.field select{width:104px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;
    background:var(--bg);color:var(--ink);font-size:15px;}
  .shint{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6;}

  /* 进度 */
  .progress{display:flex;align-items:center;justify-content:space-between;font-size:15px;color:var(--muted);
    margin:2px 4px 12px;}
  .progress b{color:var(--ink);}
  .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:0 4px 16px;}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));transition:width .25s;}

  /* 题卡 */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:26px 20px;min-height:172px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,.06);margin-bottom:16px;}
  .expr{font-size:30px;font-weight:700;letter-spacing:1px;text-align:center;font-variant-numeric:tabular-nums;line-height:1.4;}
  .slot{display:inline-block;min-width:56px;padding:2px 10px;margin:0 2px;border-bottom:3px solid var(--brand);
    color:var(--brand);border-radius:6px 6px 0 0;}
  .slot.act{background:var(--soft);}
  .slot.ok{color:var(--ok);border-color:var(--ok);} .slot.bad{color:var(--bad);border-color:var(--bad);}

  /* 竖式 */
  .vg{display:inline-block;margin:0 auto 6px;}
  .vrow{display:grid;grid-template-columns:28px 44px 44px;justify-items:center;align-items:center;}
  .vrow .op{font-size:24px;color:var(--ink);}
  .vrow .cell{font-size:30px;line-height:44px;height:44px;font-variant-numeric:tabular-nums;width:100%;text-align:center;}
  .vrow.line .cell{border-top:3px solid var(--ink);}
  .cell.unk{color:var(--brand);font-weight:800;}
  .uslots{display:flex;flex-wrap:wrap;gap:10px 16px;justify-content:center;margin-top:14px;font-size:22px;}
  .uslots .u{display:inline-flex;align-items:center;gap:6px;}
  .uslots .u b{color:var(--brand);font-weight:800;}
  .idiom-hint{font-size:13px;color:var(--muted);margin-top:8px;}

  /* 反馈 */
  .feedback{min-height:34px;text-align:center;font-size:20px;font-weight:700;margin:0 0 10px;}
  .feedback.ok{color:var(--ok);} .feedback.bad{color:var(--bad);}
  .feedback .correct{display:block;font-size:15px;font-weight:600;color:var(--muted);margin-top:2px;}

  /* 键盘 */
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
  .key{font-size:26px;font-weight:700;padding:16px 0;border-radius:16px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);cursor:pointer;box-shadow:0 3px 0 var(--line);}
  .key:active{transform:translateY(2px);box-shadow:0 1px 0 var(--line);}
  .key.fn{font-size:18px;color:var(--muted);}
  .actionbtn{width:100%;font-size:20px;font-weight:700;padding:15px 0;border-radius:16px;border:none;
    background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.12);}
  .actionbtn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
  .actionbtn.next{background:linear-gradient(135deg,var(--gold),#fb923c);}

  /* 完成页 */
  #done{text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:36px 20px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
  #done .big{font-size:52px;} #done .msg{font-size:22px;font-weight:700;margin:10px 0 4px;}
  #done .score{font-size:17px;color:var(--muted);margin-bottom:20px;}

  /* 打印练习纸（屏幕隐藏）*/
  .print-only{display:none;}
  #printSheet .sheet-head{display:flex;justify-content:space-between;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px;}
  #printSheet .sheet-head .t{font-size:20px;font-weight:700;}
  #printSheet .meta{font-size:14px;color:#333;}
  #printSheet .grid{display:grid;grid-template-columns:1fr 1fr;gap:30px 52px;}
  #printSheet .pq{border:1px solid #bbb;border-radius:12px;padding:20px 22px;min-height:150px;}
  #printSheet .pexpr{font-size:23px;font-weight:600;font-variant-numeric:tabular-nums;}
  #printSheet .ans-blank{border-bottom:1.5px solid #666;width:82px;display:inline-block;height:1.3em;}
  #printSheet .vg{display:inline-block;}
  #printSheet .unk-solve{font-size:16px;margin-top:8px;}
  #printSheet .unk-solve span{margin-right:16px;}
  #printSheet .unk-solve .bk{border-bottom:1.4px solid #666;display:inline-block;width:34px;height:1.1em;}

  @media print{
    @page{margin:1.6cm;}
    body{background:#fff;}
    .screen-only{display:none !important;}
    .print-only{display:block !important;}
    #printSheet .pq{break-inside:avoid;}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== 屏幕：答题游戏 ===== -->
  <div class="screen-only">
    <div class="topbar">
      <h1>🧮 加减综合练习</h1>
      <button class="tbtn" onclick="toggleSettings()">⚙️</button>
      <button class="tbtn" onclick="doPrint()">🖨️</button>
      <button class="tbtn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>

    <div id="settings" hidden>
      <div class="grp">题型（可多选，混合出题）</div>
      <div class="types">
        <label class="chk"><input type="checkbox" class="ty" value="paren" checked> 带括号</label>
        <label class="chk"><input type="checkbox" class="ty" value="chain" checked> 三数连减</label>
        <label class="chk"><input type="checkbox" class="ty" value="add3" checked> 加法数字谜</label>
        <label class="chk"><input type="checkbox" class="ty" value="twostep" checked> 成语数字谜</label>
      </div>
      <div class="grp">难度与数量</div>
      <div class="frow">
        <div class="field"><label>数字上限</label><input type="number" id="maxN" value="100" min="20" max="1000"></div>
        <div class="field"><label>最小数</label><input type="number" id="minN" value="10" min="1" max="99"></div>
        <div class="field"><label>运算</label><select id="ops"><option value="mix" selected>加减混合</option><option value="add">纯加</option><option value="sub">纯减</option></select></div>
        <div class="field"><label>题数</label><input type="number" id="count" value="10" min="1" max="30"></div>
        <label class="chk" style="margin-bottom:6px"><input type="checkbox" id="carry" checked> 必须进退位</label>
      </div>
      <div style="margin-top:12px"><button class="tbtn" onclick="newSession()">🔄 用新设置重开一组</button></div>
      <div class="shint">数字谜：竖式里的汉字是未知数字，算出每个字＝几，点下方方块填答案；成语题四个字连起来是一句成语。点 🖨️ 可打印成练习纸手写竖式。</div>
    </div>

    <div id="game">
      <div class="progress"><span>第 <b id="pNo">1</b> / <b id="pTot">10</b> 题</span><span>⭐ 答对 <b id="pOk">0</b></span></div>
      <div class="bar"><i id="pBar" style="width:0%"></i></div>
      <div class="card" id="card"></div>
      <div class="feedback" id="fb"></div>
      <div class="pad" id="pad"></div>
      <button class="actionbtn" id="action" onclick="onAction()">确定</button>
    </div>

    <div id="done" hidden></div>
  </div>

  <!-- ===== 打印练习纸 ===== -->
  <div id="printSheet" class="print-only"></div>

</div>

<script>
const $ = id => document.getElementById(id);

// ── 素材池 ──
const IDIOMS = ['亡羊补牢','守株待兔','刻舟求剑','掩耳盗铃','叶公好龙','狐假虎威',
  '对牛弹琴','画蛇添足','车水马龙','鸟语花香','百花齐放','万紫千红','学无止境',
  '勤能补拙','自相矛盾','拔苗助长','望梅止渴','画龙点睛','滥竽充数','春暖花开',
  '水落石出','山清水秀','手忙脚乱','七上八下'];
const CHARS = [...'春夏秋冬花草山水日月星光风云雨雪金木火土天地和喜乐福寿松竹梅兰'];

function randInt(lo,hi){ return lo + Math.floor(Math.random()*(hi-lo+1)); }
function pick(a){ return a[randInt(0,a.length-1)]; }
function pickN(a,n){ const b=[...a],o=[]; while(o.length<n&&b.length){ o.push(b.splice(randInt(0,b.length-1),1)[0]); } return o; }
function needsCarry(x,y,op){ const ux=x%10,uy=y%10; return op==='+'?(ux+uy>=10):(ux<uy); }
function pickOp(m){ if(m==='add')return '+'; if(m==='sub')return '-'; return Math.random()<0.5?'+':'-'; }
function d2(n){ return [Math.floor(n/10), n%10]; }

// ── 生成器（已校验，原样复用）──
function genInline(cfg, paren){
  for(let t=0;t<600;t++){
    const op1=pickOp(cfg.ops), op2=pickOp(cfg.ops);
    const a=randInt(cfg.min,cfg.max), b=randInt(cfg.min,cfg.max), c=randInt(cfg.min,cfg.max);
    let expr, ans, steps, carryOk;
    if(paren){
      if(randInt(0,1)===0){
        const inner=op1==='+'?a+b:a-b; if(inner<0||inner>cfg.max)continue;
        ans=op2==='+'?inner+c:inner-c; if(ans<0||ans>cfg.max)continue;
        expr=`( ${a} ${op1} ${b} ) ${op2} ${c}`; steps=[`${a}${op1}${b}=${inner}`,`${inner}${op2}${c}=${ans}`];
        carryOk=needsCarry(a,b,op1)||needsCarry(inner,c,op2);
      }else{
        const inner=op2==='+'?b+c:b-c; if(inner<0||inner>cfg.max)continue;
        ans=op1==='+'?a+inner:a-inner; if(ans<0||ans>cfg.max)continue;
        expr=`${a} ${op1} ( ${b} ${op2} ${c} )`; steps=[`${b}${op2}${c}=${inner}`,`${a}${op1}${inner}=${ans}`];
        carryOk=needsCarry(b,c,op2)||needsCarry(a,inner,op1);
      }
    }else{
      const m=op1==='+'?a+b:a-b; if(m<0||m>cfg.max)continue;
      ans=op2==='+'?m+c:m-c; if(ans<0||ans>cfg.max)continue;
      expr=`${a} ${op1} ${b} ${op2} ${c}`; steps=[`${a}${op1}${b}=${m}`,`${m}${op2}${c}=${ans}`];
      carryOk=needsCarry(a,b,op1)||needsCarry(m,c,op2);
    }
    if(cfg.carry && !carryOk) continue;
    return {kind:'inline', type:paren?'带括号':'连加减', expr, answer:ans, steps};
  }
  return null;
}
function genAdd3(){
  for(let t=0;t<800;t++){
    const a=randInt(10,80), b=randInt(10,80), c=randInt(10,80), S=a+b+c;
    if(S<10||S>99) continue;
    const D={a:d2(a), b:d2(b), c:d2(c)};
    const cells=[['a',0],['a',1],['b',0],['b',1],['c',0],['c',1]];
    let i=randInt(0,5), j=randInt(0,5); if(i===j) continue; if(i>j)[i,j]=[j,i];
    const bl=[cells[i], cells[j]];
    let count=0;
    for(let v1=0;v1<10;v1++)for(let v2=0;v2<10;v2++){
      if(bl[0][1]===0&&v1===0)continue; if(bl[1][1]===0&&v2===0)continue;
      const g={a:[...D.a], b:[...D.b], c:[...D.c]};
      g[bl[0][0]][bl[0][1]]=v1; g[bl[1][0]][bl[1][1]]=v2;
      if(g.a[0]*10+g.a[1] + g.b[0]*10+g.b[1] + g.c[0]*10+g.c[1] === S) count++;
    }
    if(count!==1) continue;
    const labels=pickN(CHARS,2);
    const blankSet=new Set([i,j]);
    const labelOf={}; labelOf[i]=labels[0]; labelOf[j]=labels[1];
    const valOf={}; valOf[i]=D[bl[0][0]][bl[0][1]]; valOf[j]=D[bl[1][0]][bl[1][1]];
    function cellAt(idx, numKey, digIdx){
      if(blankSet.has(idx)) return {v:labelOf[idx], unk:true};
      return {v:String(D[numKey][digIdx])};
    }
    const Sd=d2(S);
    const rows=[
      {op:'',  cells:[cellAt(0,'a',0), cellAt(1,'a',1)]},
      {op:'',  cells:[cellAt(2,'b',0), cellAt(3,'b',1)]},
      {op:'+', cells:[cellAt(4,'c',0), cellAt(5,'c',1)]},
      {op:'',  line:true, cells:[{v:String(Sd[0])},{v:String(Sd[1])}]},
    ];
    const unknowns=[i,j].map(k=>({label:labelOf[k], val:valOf[k]}));
    return {kind:'vgrid', type:'加法数字谜', rows, unknowns, steps:[`${a}+${b}+${c}=${S}`]};
  }
  return null;
}
function genTwostep(){
  for(let t=0;t<2500;t++){
    const op1=pickOp('mix'), op2=pickOp('mix');
    const A=randInt(11,89), B=randInt(11,89);
    const M=op1==='+'?A+B:A-B; if(M<10||M>99)continue;
    const Dn=randInt(11,89);
    const R=op2==='+'?M+Dn:M-Dn; if(R<10||R>99)continue;
    const dg={A:d2(A), B:d2(B), M:d2(M), D:d2(Dn)};
    const bA=randInt(0,1), bB=randInt(0,1), bM=randInt(0,1), bD=randInt(0,1);
    let count=0;
    for(let va=0;va<10;va++)for(let vb=0;vb<10;vb++)for(let vm=0;vm<10;vm++)for(let vd=0;vd<10;vd++){
      if(bA===0&&va===0)continue; if(bB===0&&vb===0)continue;
      if(bM===0&&vm===0)continue; if(bD===0&&vd===0)continue;
      const gA=[...dg.A],gB=[...dg.B],gM=[...dg.M],gD=[...dg.D];
      gA[bA]=va; gB[bB]=vb; gM[bM]=vm; gD[bD]=vd;
      const nA=gA[0]*10+gA[1], nB=gB[0]*10+gB[1], nM=gM[0]*10+gM[1], nD=gD[0]*10+gD[1];
      if((op1==='+'?nA+nB:nA-nB)!==nM) continue;
      if((op2==='+'?nM+nD:nM-nD)===R) count++;
    }
    if(count!==1) continue;
    const idiom=pick(IDIOMS.filter(w=>new Set(w).size===4));
    const ch=[...idiom];
    const rowsDef=[
      {key:'A', blank:bA, op:''},
      {key:'B', blank:bB, op:op1},
      {key:'M', blank:bM, op:'', line:true},
      {key:'D', blank:bD, op:op2},
      {key:'R', blank:-1, op:'', line:true},
    ];
    const trueVal={A:dg.A, B:dg.B, M:dg.M, D:dg.D, R:d2(R)};
    const unknowns=[];
    const rows=rowsDef.map(rd=>{
      const dig=trueVal[rd.key];
      const cells=[0,1].map(di=>{
        if(rd.blank===di){ const label=ch[unknowns.length]; unknowns.push({label, val:dig[di]}); return {v:label, unk:true}; }
        return {v:String(dig[di])};
      });
      return {op:rd.op, line:rd.line||false, cells};
    });
    return {kind:'vgrid', type:'成语数字谜', idiom, rows, unknowns, steps:[`${A}${op1}${B}=${M}`, `${M}${op2}${Dn}=${R}`]};
  }
  return null;
}

// ── 出题 ──
function readCfg(){
  return {
    max: Math.max(20, +$('maxN').value || 100),
    min: Math.min(99, Math.max(1, +$('minN').value || 10)),
    count: Math.min(30, Math.max(1, +$('count').value || 10)),
    ops: $('ops').value, carry: $('carry').checked,
  };
}
function enabledTypes(){ return [...document.querySelectorAll('.ty:checked')].map(e=>e.value); }
function makeOne(cfg, ty){
  if(ty==='paren')return genInline(cfg,true);
  if(ty==='chain')return genInline(cfg,false);
  if(ty==='add3')return genAdd3();
  if(ty==='twostep')return genTwostep();
  return null;
}
function buildSession(){
  const cfg=readCfg(); const types=enabledTypes();
  if(types.length===0){ alert('至少勾选一种题型'); return []; }
  const out=[];
  for(let i=0;i<cfg.count;i++){
    const ty=pick(types); let p=makeOne(cfg,ty);
    if(!p){ for(const alt of types){ p=makeOne(cfg,alt); if(p)break; } }
    if(p) out.push(p);
  }
  return out;
}

// ── 游戏状态 ──
let session=[], idx=0, okCount=0, cur=null, answered=false, active=0;

function newSession(){
  session=buildSession();
  if(session.length===0) return;
  idx=0; okCount=0;
  $('settings').hidden=true;
  $('done').hidden=true; $('game').hidden=false;
  $('pTot').textContent=session.length;
  showProblem();
}
function showProblem(){
  const p=session[idx]; answered=false; active=0;
  cur={ p, kind:p.kind,
    slots: p.kind==='inline' ? [{val:'',correct:p.answer}]
          : p.unknowns.map(u=>({val:'',correct:u.val,label:u.label})) };
  $('pNo').textContent=idx+1;
  $('pOk').textContent=okCount;
  $('pBar').style.width=Math.round(idx/session.length*100)+'%';
  $('fb').textContent=''; $('fb').className='feedback';
  const act=$('action'); act.textContent='确定'; act.className='actionbtn';
  renderCard(); renderPad();
}
function renderCard(){
  const p=cur.p;
  let html='';
  if(cur.kind==='inline'){
    const s=cur.slots[0];
    const cls='slot act'+(answered?(isSlotOk(s)?' ok':' bad'):'');
    html=`<div class="expr">${p.expr} = <span class="${cls}">${s.val||'▢'}</span></div>`;
  }else{
    const rows=p.rows.map(r=>{
      const cells=r.cells.map(c=>`<span class="cell${c.unk?' unk':''}">${c.v}</span>`).join('');
      return `<div class="vrow${r.line?' line':''}"><span class="op">${r.op}</span>${cells}</div>`;
    }).join('');
    const us=cur.slots.map((s,i)=>{
      const cls='slot'+(i===active&&!answered?' act':'')+(answered?(isSlotOk(s)?' ok':' bad'):'');
      return `<span class="u">${s.label} = <span class="${cls}" onclick="selectSlot(${i})">${s.val||'▢'}</span></span>`;
    }).join('');
    html=`<div class="vg">${rows}</div><div class="uslots">${us}</div>`;
    if(p.idiom) html+=`<div class="idiom-hint">💡 四个字连起来是一句成语</div>`;
  }
  $('card').innerHTML=html;
}
function isSlotOk(s){ return s.val!=='' && +s.val===s.correct; }

function renderPad(){
  const keys=['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
  $('pad').innerHTML=keys.map(k=>{
    if(k==='⌫') return `<button class="key fn" onclick="padBack()">⌫</button>`;
    if(k==='✓') return `<button class="key fn" onclick="onAction()">下一题<br><small>或按确定</small></button>`;
    return `<button class="key" onclick="padTap('${k}')">${k}</button>`;
  }).join('');
}
function padTap(d){
  if(answered) return;
  const s=cur.slots[active];
  if(cur.kind==='vgrid'){ s.val=d; advanceSlot(); }
  else { if(s.val.length<3) s.val+=d; }
  renderCard();
}
function padBack(){
  if(answered) return;
  const s=cur.slots[active]; s.val=s.val.slice(0,-1); renderCard();
}
function selectSlot(i){ if(!answered){ active=i; renderCard(); } }
function advanceSlot(){
  for(let k=1;k<=cur.slots.length;k++){
    const ni=(active+k)%cur.slots.length;
    if(cur.slots[ni].val===''){ active=ni; return; }
  }
}
function onAction(){ answered ? nextProblem() : checkNow(); }
function checkNow(){
  answered=true;
  const ok=cur.slots.every(isSlotOk);
  if(ok) okCount++;
  $('pOk').textContent=okCount;
  const fb=$('fb');
  if(ok){ fb.textContent='✓ 答对啦！真棒 🎉'; fb.className='feedback ok'; }
  else{
    const corr = cur.kind==='inline' ? `正确答案：${cur.p.answer}`
      : '正确：'+cur.p.unknowns.map(u=>`${u.label}=${u.val}`).join('　');
    fb.innerHTML=`✗ 再看看～<span class="correct">${corr}</span>`; fb.className='feedback bad';
  }
  renderCard();
  const act=$('action'); act.textContent = idx+1>=session.length ? '看结果' : '下一题 ▶'; act.className='actionbtn next';
}
function nextProblem(){
  idx++;
  if(idx>=session.length){ showDone(); return; }
  showProblem();
}
function showDone(){
  $('game').hidden=true;
  const d=$('done'); d.hidden=false;
  $('pBar').style.width='100%';
  const n=session.length, star = okCount===n?'🏆':(okCount>=n*0.8?'🌟':(okCount>=n*0.6?'👍':'💪'));
  const msg = okCount===n?'全对！太厉害了！':(okCount>=n*0.8?'非常棒！':(okCount>=n*0.6?'不错，继续加油！':'再来一组会更好！'));
  d.innerHTML=`<div class="big">${star}</div><div class="msg">${msg}</div>
    <div class="score">答对 ${okCount} / ${n} 题</div>
    <button class="actionbtn" onclick="newSession()">🔄 再来一组</button>`;
}

// ── 打印 ──
function vgridPrint(p){
  const rows=p.rows.map(r=>{
    const cells=r.cells.map(c=>`<span class="cell${c.unk?' unk':''}" style="display:inline-block;width:34px;text-align:center;font-size:24px;${r.line?'border-top:2.5px solid #000;':''}">${c.v}</span>`).join('');
    return `<div style="white-space:nowrap;"><span style="display:inline-block;width:22px;text-align:center;font-size:20px;">${r.op}</span>${cells}</div>`;
  }).join('');
  const solve=p.unknowns.map(u=>`<span>${u.label} = <span class="bk"></span></span>`).join('');
  return `<div class="vg">${rows}</div><div class="unk-solve">${solve}</div>`;
}
function doPrint(){
  const items = (session.length?session:buildSession());
  const qs=items.map(p=>{
    const body = p.kind==='inline'
      ? `<div class="pexpr">${p.expr} = <span class="ans-blank"></span></div>`
      : vgridPrint(p);
    return `<div class="pq">${body}</div>`;
  }).join('');
  $('printSheet').innerHTML=`
    <div class="sheet-head"><div class="t">数学每日练习 · 加减综合</div>
      <div class="meta">姓名：____________　　　　日期：____________　　　　用时：________</div></div>
    <div class="grid">${qs}</div>`;
  window.print();
}

// ── 杂项 ──
function toggleSettings(){ $('settings').hidden=!$('settings').hidden; }
function toggleTheme(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', dark?'light':'dark');
  $('themeBtn').textContent = dark?'🌙':'☀️';
}

newSession(); // 打开即开始一组
</script>
</body>
