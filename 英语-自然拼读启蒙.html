<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>战战的自然拼读启蒙 Phonics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: "Comic Sans MS", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #c3f0ca 0%, #a0e7e5 50%, #b5b9ff 100%);
    color: #2d3436;
  }
  body { display: flex; flex-direction: column; padding: 0.8vh 1.5vw; }

  /* ===== Tabs ===== */
  .tabs { flex: 0 0 auto; display: flex; gap: 8px; justify-content: center; margin-bottom: 0.8vh; }
  .tabs button {
    border: none; background: rgba(255,255,255,0.6); color: #2d3436;
    padding: 1vh 2.4vw; border-radius: 999px 999px 0 0;
    font-size: 2vh; font-weight: bold; cursor: pointer;
    box-shadow: 0 -3px 0 rgba(0,0,0,0.08) inset;
    transition: background 0.15s, transform 0.1s;
  }
  .tabs button:hover { background: rgba(255,255,255,0.85); }
  .tabs button.active {
    background: #fff; color: #0984e3; transform: translateY(-2px);
    box-shadow: 0 -4px 0 #74b9ff inset;
  }

  .page { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
  .page[hidden] { display: none; }

  /* ===== Common header ===== */
  .head-row {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 0 1vw;
  }
  h1 {
    font-size: 2.8vh; color: #fff;
    text-shadow: 2px 2px 0 #74b9ff, 4px 4px 0 rgba(0,0,0,0.1);
    letter-spacing: 2px; line-height: 1.1;
  }
  .subtitle { font-size: 1.5vh; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); margin-top: 4px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .toolbar button {
    border: none; background: #fff; color: #2d3436;
    padding: 1vh 1.5vw; border-radius: 999px; font-size: 1.5vh; font-weight: bold;
    cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,0.15);
    transition: transform 0.1s, box-shadow 0.1s; white-space: nowrap;
  }
  .toolbar button:hover { transform: translateY(-2px); box-shadow: 0 5px 0 rgba(0,0,0,0.15); }
  .toolbar button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
  .toolbar button.active { background: #00b894; color: #fff; }

  .board-wrap {
    flex: 1 1 auto; margin-top: 1vh; background: rgba(255,255,255,0.85);
    border-radius: 18px; padding: 1.2vh 1vw; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; min-height: 0;
  }
  footer {
    flex: 0 0 auto; text-align: center; padding-top: 0.5vh; color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3); font-size: 1.3vh;
  }
  .speaking { box-shadow: 0 0 0 3px #fff, 0 6px 18px rgba(9, 132, 227, 0.6) !important; }

  /* ===== Letter wall ===== */
  .letter-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 1vh;
    height: 100%; width: 100%; align-content: stretch;
  }
  .lcell {
    border-radius: 14px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer; user-select: none;
    padding: 0.4vh; position: relative; box-shadow: 0 3px 0 rgba(0,0,0,0.1);
    transition: transform 0.12s, box-shadow 0.12s; overflow: hidden;
  }
  .lcell:hover { transform: scale(1.07) rotate(-1deg); box-shadow: 0 8px 16px rgba(0,0,0,0.25); z-index: 5; }
  .lletter { font-size: 2.8vh; font-weight: 900; line-height: 1; }
  .lipa { font-size: 1.5vh; font-weight: bold; opacity: 0.85; margin-top: 2px; font-family: "Times New Roman", serif; }
  .lpic { font-size: 2.6vh; line-height: 1; margin-top: 2px; }
  .lword { font-size: 1.5vh; font-weight: bold; margin-top: 1px; }
  /* color palette cycling */
  .lc0{background:#fab1a0;color:#6c3a2a;} .lc1{background:#ffeaa7;color:#7c5e10;}
  .lc2{background:#a8e6cf;color:#1d6b4e;} .lc3{background:#81ecec;color:#0e5454;}
  .lc4{background:#74b9ff;color:#1e3a6b;} .lc5{background:#a29bfe;color:#2d2570;}
  .lc6{background:#fd79a8;color:#6b1c3e;}
  /* letter-wall hide mode: cover the keyword (picture+word), keep letter */
  body.letter-hide .lcell:not(.revealed) .lipa,
  body.letter-hide .lcell:not(.revealed) .lpic,
  body.letter-hide .lcell:not(.revealed) .lword { visibility: hidden; }
  body.letter-hide .lcell:not(.revealed)::after {
    content: "?"; position: absolute; bottom: 6%; font-size: 2vh; font-weight: 900; opacity: 0.5;
  }

  /* ===== Blend matrix ===== */
  .blend-grid { display: grid; gap: 0.5vh; height: 100%; aspect-ratio: 1 / 1; max-width: 100%; }
  .bcell {
    display: flex; align-items: center; justify-content: center; border-radius: 8px;
    font-size: 1.7vh; font-weight: 700; user-select: none; position: relative;
    transition: transform 0.08s, box-shadow 0.1s, filter 0.1s;
  }
  .bcell.corner { background: #2d3436; color: #ffd86b; font-size: 2vh; font-weight: 900; }
  .bcell.head { background: #0984e3; color: #fff; font-weight: 900; cursor: pointer; }
  .bcell.word { background: #a8e6cf; color: #1d6b4e; cursor: pointer; }
  .bcell.word:hover { transform: scale(1.15); box-shadow: 0 6px 16px rgba(0,0,0,0.3); z-index: 5; }
  .bcell.void { background: #f1f2f6; color: #b2bec3; }
  .bword-emoji { font-size: 1.3vh; margin-right: 2px; }
  .bcell.hl-line { filter: brightness(0.9); box-shadow: inset 0 0 0 2px #fd79a8; }
  .bcell.head.hl-line { background: #fd79a8; }
  .bcell.hl-cross { background: #ffd86b !important; color: #6b4d0a !important; box-shadow: inset 0 0 0 2px #e17055; }
  /* blend hide mode: cover real-word cells */
  body.blend-hide .bcell.word:not(.revealed) { color: transparent; }
  body.blend-hide .bcell.word:not(.revealed) .bword-emoji { visibility: hidden; }
  body.blend-hide .bcell.word:not(.revealed)::after {
    content: "?"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #dfe6e9; border-radius: 8px; color: #95a5a6; font-size: 2vh; font-weight: 900;
  }
  body.blend-hide .bcell.word.revealed { animation: flip 0.4s ease-out; }
  @keyframes flip { 0% { transform: rotateY(90deg) scale(1.1); } 100% { transform: rotateY(0) scale(1); } }

  /* ===== Game ===== */
  .game-header {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    padding: 0 1vw; gap: 12px;
  }
  .game-title { font-size: 2.4vh; color: #fff; text-shadow: 2px 2px 0 #6c5ce7, 4px 4px 0 rgba(0,0,0,0.1); letter-spacing: 2px; }
  .stats { display: flex; gap: 12px; font-size: 1.8vh; font-weight: bold; color: #fff; }
  .stats .chip {
    background: rgba(255,255,255,0.92); color: #2d3436; padding: 0.6vh 1.3vw;
    border-radius: 999px; box-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }
  .stats .chip.timer-warn { background: #ffd86b; color: #6b4d0a; animation: tp 0.6s infinite alternate; }
  .stats .chip.timer-danger { background: #ff7675; color: #fff; animation: tp 0.4s infinite alternate; }
  @keyframes tp { from { transform: scale(1); } to { transform: scale(1.08); } }
  .game-controls { display: flex; gap: 8px; }
  .game-controls button {
    border: none; background: #fff; color: #2d3436; padding: 1vh 1.4vw; border-radius: 999px;
    font-size: 1.5vh; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }
  .game-controls button:hover { transform: translateY(-2px); }
  .game-controls button.primary { background: #00b894; color: #fff; }
  .game-controls button.danger { background: #ff7675; color: #fff; }

  .game-settings {
    flex: 0 0 auto; display: flex; gap: 2vw; align-items: center; justify-content: center;
    flex-wrap: wrap; padding: 0.6vh 1vw; background: rgba(255,255,255,0.8);
    border-radius: 14px; margin-top: 0.6vh; box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .game-settings .setting { display: flex; align-items: center; gap: 8px; }
  .game-settings label { font-size: 1.6vh; font-weight: bold; color: #6c5ce7; }
  .game-settings select {
    font-size: 1.6vh; padding: 0.4vh 0.8vw; border-radius: 10px; border: 2px solid #a29bfe;
    background: #fff; font-weight: bold; cursor: pointer; color: #2d3436;
  }

  .target-bar {
    flex: 0 0 auto; margin-top: 1vh; display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 0.8vh 1vw; background: rgba(255,255,255,0.88);
    border-radius: 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .target-bar .label { font-size: 2vh; font-weight: bold; color: #6c5ce7; }
  .target-emoji { font-size: 5vh; line-height: 1; }
  #btnReplay {
    border: none; background: #6c5ce7; color: #fff; font-size: 2.4vh; font-weight: 900;
    border-radius: 999px; padding: 0.8vh 2.4vw; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.25);
  }
  #btnReplay:hover { transform: translateY(-2px); }

  .field-wrap {
    flex: 1 1 auto; margin-top: 1vh; background: rgba(255,255,255,0.7); border-radius: 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15); position: relative; overflow: hidden; min-height: 0;
  }
  .falling-card {
    position: absolute; min-width: 11vh; height: 8vh; padding: 0 1vh; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 3vh; font-weight: 900;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15); color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    letter-spacing: 1px; cursor: pointer; will-change: transform;
  }
  .falling-card.glow { animation: pulse 0.4s ease-in-out infinite alternate; }
  @keyframes pulse {
    from { box-shadow: 0 5px 0 rgba(0,0,0,0.15), 0 0 0 0 rgba(255,255,255,0.5); }
    to { box-shadow: 0 5px 0 rgba(0,0,0,0.15), 0 0 0 8px rgba(255,255,255,0); }
  }
  .falling-card.wrong { animation: cardShake 0.4s; }
  @keyframes cardShake {
    0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-4deg); }
    75% { transform: translateX(8px) rotate(4deg); }
  }
  .explosion { position: absolute; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .explosion .answer-text {
    font-size: 5vh; font-weight: 900; color: #fff;
    text-shadow: 0 0 10px #fff, 0 0 20px #ffd86b, 3px 3px 0 #ff7675;
    animation: answerPop 1.3s ease-out forwards; z-index: 2; white-space: nowrap;
  }
  @keyframes answerPop {
    0% { transform: scale(0.3); opacity: 0; } 30% { transform: scale(1.3); opacity: 1; }
    70% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1.5) translateY(-30px); opacity: 0; }
  }
  .particle { position: absolute; width: 1.4vh; height: 1.4vh; border-radius: 50%; animation: burst 1.1s ease-out forwards; }
  @keyframes burst {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }
  .game-overlay {
    position: absolute; inset: 0; background: rgba(45,52,54,0.85); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; color: #fff; z-index: 100; border-radius: 18px;
  }
  .game-overlay h2 { font-size: 4.4vh; color: #ffd86b; text-shadow: 3px 3px 0 #ff7675; letter-spacing: 3px; }
  .game-overlay p { font-size: 2.2vh; text-align: center; padding: 0 4vw; }
  .overlay-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .game-overlay button {
    border: none; background: #00b894; color: #fff; padding: 1.5vh 3.5vw; border-radius: 999px;
    font-size: 2.3vh; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }
  .game-overlay button:hover { transform: translateY(-2px); }
  .game-overlay button.secondary { background: #fff; color: #2d3436; }
  .game-overlay button.tertiary { background: #b2bec3; color: #fff; }
</style>
</head>
<body>
  <nav class="tabs">
    <button class="active" data-page="letterPage">🔤 字母音墙</button>
    <button data-page="blendPage">🧩 拼读矩阵</button>
    <button data-page="gamePage">🎮 听音闯关</button>
  </nav>

  <!-- ====== Letter wall ====== -->
  <main class="page" id="letterPage">
    <div class="head-row">
      <div>
        <h1>🔤 字母音墙 Letter Sounds</h1>
        <div class="subtitle">点字母听它的发音（用示例词带出音）🔊</div>
      </div>
      <div class="toolbar">
        <button class="btn-sound active">🔊 朗读开</button>
        <button id="btnLetterHide">🙈 盖住考考我</button>
      </div>
    </div>
    <div class="board-wrap"><div class="letter-grid" id="letterGrid"></div></div>
    <footer>每个字母配一个示例词，听单词开头的音就是这个字母的发音 💪</footer>
  </main>

  <!-- ====== Blend matrix ====== -->
  <main class="page" id="blendPage" hidden>
    <div class="head-row">
      <div>
        <h1>🧩 拼读矩阵 Word Families</h1>
        <div class="subtitle">声母 + 韵脚 = 单词，绿色格能点（横竖会高亮同族词）✨</div>
      </div>
      <div class="toolbar">
        <button class="btn-sound active">🔊 朗读开</button>
        <button id="btnBlendHide">🙈 盖住考考我</button>
      </div>
    </div>
    <div class="board-wrap"><div class="blend-grid" id="blendGrid"></div></div>
    <footer>盖住后看着「声母 + 韵脚」自己拼出来，点开听对不对 🔊</footer>
  </main>

  <!-- ====== Game ====== -->
  <main class="page" id="gamePage" hidden>
    <div class="game-header">
      <div class="game-title">🎮 听音闯关</div>
      <div class="stats">
        <div class="chip">⏱ <span id="timer">60</span>s</div>
        <div class="chip">⭐ <span id="score">0</span></div>
        <div class="chip">❤️ <span id="lives">3</span></div>
        <div class="chip">🚀 第 <span id="level">1</span> 关</div>
      </div>
      <div class="game-controls">
        <button id="btnStart" class="primary">▶ 开始</button>
        <button id="btnPause">⏸ 暂停</button>
        <button id="btnReset" class="danger">🔄 重玩</button>
      </div>
    </div>

    <div class="game-settings">
      <div class="setting">
        <label>同屏卡片</label>
        <select id="cfgConcurrent">
          <option value="2">2 个</option>
          <option value="3" selected>3 个</option>
          <option value="4">4 个</option>
        </select>
      </div>
      <div class="setting">
        <label>词族范围</label>
        <select id="cfgFamily"><option value="all" selected>全部</option></select>
      </div>
    </div>

    <div class="target-bar">
      <span class="label">请找出：</span>
      <span class="target-emoji" id="targetEmoji">🔊</span>
      <button id="btnReplay">🔊 再听一次</button>
    </div>

    <div class="field-wrap" id="field">
      <div class="game-overlay" id="overlay">
        <h2 id="overlayTitle">准备好了吗？</h2>
        <p id="overlayMsg">听一个单词，从天上掉下来的卡片里，点出对的那个就会爆炸！</p>
        <div class="overlay-buttons" id="overlayButtons"></div>
      </div>
    </div>
  </main>

<script>
  // =========================================================
  //  Audio layer —— 预留录音接口
  //  把录音文件放到同目录 audio/ 下，在 AUDIO_MAP 登记即可自动替换 TTS。
  //  key 约定：letter:a / word:cat
  //  例：AUDIO_MAP["word:cat"] = "cat.mp3";
  // =========================================================
  const AUDIO_DIR = "audio/";
  const AUDIO_MAP = {
    // "letter:a": "letter-a.mp3",
    // "word:cat": "cat.mp3",
  };
  const _audioCache = {};

  let soundOn = true;
  let enVoice = null;
  function pickVoice() {
    const voices = speechSynthesis.getVoices();
    enVoice =
      voices.find(v => /en[-_]US/i.test(v.lang)) ||
      voices.find(v => /en[-_]GB/i.test(v.lang)) ||
      voices.find(v => /^en/i.test(v.lang)) || null;
  }
  if ('speechSynthesis' in window) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }

  function speak(text, el) {
    if (!soundOn || !('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    if (enVoice) u.voice = enVoice;
    u.rate = 0.8; u.pitch = 1.05;
    if (el) {
      u.onstart = () => el.classList.add('speaking');
      u.onend = () => el.classList.remove('speaking');
      u.onerror = () => el.classList.remove('speaking');
    }
    speechSynthesis.speak(u);
  }

  // 统一发音入口：先找录音，没有则回退 TTS
  function playAudio(key, fallbackText, el) {
    if (!soundOn) return;
    const file = AUDIO_MAP[key];
    if (file) {
      let a = _audioCache[key];
      if (!a) { a = new Audio(AUDIO_DIR + file); _audioCache[key] = a; }
      a.currentTime = 0;
      if (el) { el.classList.add('speaking'); a.onended = () => el.classList.remove('speaking'); }
      a.play().catch(() => speak(fallbackText, el));
      return;
    }
    speak(fallbackText, el);
  }

  // unlock TTS on first interaction
  document.addEventListener("click", function unlock() {
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance(' '); u.volume = 0; speechSynthesis.speak(u);
    }
  }, { once: true });

  // ============ Tabs ============
  const pages = {
    letterPage: document.getElementById("letterPage"),
    blendPage: document.getElementById("blendPage"),
    gamePage: document.getElementById("gamePage"),
  };
  const tabBtns = document.querySelectorAll(".tabs button");
  tabBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      tabBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      Object.entries(pages).forEach(([k, el]) => el.hidden = k !== btn.dataset.page);
    });
  });

  // ============ shared sound buttons ============
  const soundBtns = document.querySelectorAll(".btn-sound");
  function syncSoundButtons() {
    soundBtns.forEach(b => {
      b.classList.toggle("active", soundOn);
      b.textContent = soundOn ? "🔊 朗读开" : "🔇 朗读关";
    });
  }
  soundBtns.forEach(b => b.addEventListener("click", () => {
    soundOn = !soundOn;
    if (!soundOn) speechSynthesis.cancel();
    syncSoundButtons();
  }));

  // ============ Letter wall ============
  const LETTERS = [
    { l: "a", ipa: "/æ/", word: "apple", pic: "🍎" },
    { l: "b", ipa: "/b/", word: "ball", pic: "⚽" },
    { l: "c", ipa: "/k/", word: "cat", pic: "🐱" },
    { l: "d", ipa: "/d/", word: "dog", pic: "🐶" },
    { l: "e", ipa: "/e/", word: "egg", pic: "🥚" },
    { l: "f", ipa: "/f/", word: "fish", pic: "🐟" },
    { l: "g", ipa: "/g/", word: "goat", pic: "🐐" },
    { l: "h", ipa: "/h/", word: "hat", pic: "🎩" },
    { l: "i", ipa: "/ɪ/", word: "igloo", pic: "🧊" },
    { l: "j", ipa: "/dʒ/", word: "juice", pic: "🧃" },
    { l: "k", ipa: "/k/", word: "kite", pic: "🪁" },
    { l: "l", ipa: "/l/", word: "lion", pic: "🦁" },
    { l: "m", ipa: "/m/", word: "monkey", pic: "🐵" },
    { l: "n", ipa: "/n/", word: "nest", pic: "🪺" },
    { l: "o", ipa: "/ɒ/", word: "octopus", pic: "🐙" },
    { l: "p", ipa: "/p/", word: "pig", pic: "🐷" },
    { l: "q", ipa: "/kw/", word: "queen", pic: "👑" },
    { l: "r", ipa: "/r/", word: "rabbit", pic: "🐰" },
    { l: "s", ipa: "/s/", word: "sun", pic: "☀️" },
    { l: "t", ipa: "/t/", word: "tiger", pic: "🐯" },
    { l: "u", ipa: "/ʌ/", word: "umbrella", pic: "☂️" },
    { l: "v", ipa: "/v/", word: "van", pic: "🚐" },
    { l: "w", ipa: "/w/", word: "window", pic: "🪟" },
    { l: "x", ipa: "/ks/", word: "fox", pic: "🦊" },
    { l: "y", ipa: "/j/", word: "yo-yo", pic: "🪀" },
    { l: "z", ipa: "/z/", word: "zebra", pic: "🦓" },
  ];

  const letterGrid = document.getElementById("letterGrid");
  LETTERS.forEach((e, i) => {
    const cell = document.createElement("div");
    cell.className = "lcell lc" + (i % 7);
    cell.innerHTML =
      '<div class="lletter">' + e.l.toUpperCase() + e.l + '</div>' +
      '<div class="lipa">' + e.ipa + '</div>' +
      '<div class="lpic">' + e.pic + '</div>' +
      '<div class="lword">' + e.word + '</div>';
    cell.addEventListener("click", () => {
      if (document.body.classList.contains("letter-hide")) {
        if (cell.classList.contains("revealed")) { cell.classList.remove("revealed"); return; }
        cell.classList.add("revealed");
      }
      // 念示例词带出该字母的音（开头音 = 字母 phonics 音）
      playAudio("letter:" + e.l, e.word, cell);
    });
    letterGrid.appendChild(cell);
  });

  const btnLetterHide = document.getElementById("btnLetterHide");
  btnLetterHide.addEventListener("click", () => {
    const hidden = document.body.classList.toggle("letter-hide");
    btnLetterHide.classList.toggle("active", hidden);
    btnLetterHide.textContent = hidden ? "👀 全部显示" : "🙈 盖住考考我";
    letterGrid.querySelectorAll(".lcell.revealed").forEach(c => c.classList.remove("revealed"));
  });

  // ============ Blend matrix ============
  const ONSETS = ["b","c","d","f","h","l","m","n","p","r","s","t"];
  const RIMES = ["at","an","ap","ig","ip","op","og","un","ug","et"];
  // 真词表（onset+rime）。不在表里的格子视作非词，淡化处理。
  const REAL_WORDS = new Set([
    "bat","cat","fat","hat","mat","pat","rat","sat",
    "ban","can","fan","man","pan","ran","tan",
    "cap","lap","map","nap","rap","sap","tap",
    "big","dig","fig","pig","rig",
    "dip","hip","lip","nip","rip","sip","tip",
    "cop","hop","mop","pop","top",
    "dog","fog","hog","log",
    "bun","fun","run","sun",
    "bug","hug","mug","rug","tug",
    "bet","let","met","net","pet","set",
  ]);
  const WORD_EMOJI = {
    cat:"🐱", dog:"🐶", sun:"☀️", pig:"🐷", hat:"🎩", bat:"🦇", cap:"🧢",
    fan:"🪭", map:"🗺️", mug:"☕", bug:"🐛", net:"🥅", bus:"🚌", fox:"🦊",
    run:"🏃", top:"🔝", rat:"🐀", fish:"🐟", lip:"👄", hop:"🐇",
  };

  const blendGrid = document.getElementById("blendGrid");
  blendGrid.style.gridTemplateColumns = "repeat(" + (RIMES.length + 1) + ", 1fr)";
  blendGrid.style.gridTemplateRows = "repeat(" + (ONSETS.length + 1) + ", 1fr)";

  function bClear() { blendGrid.querySelectorAll(".hl-line,.hl-cross").forEach(el => el.classList.remove("hl-line","hl-cross")); }
  function bHighlight(r, c) {
    bClear();
    blendGrid.querySelectorAll(".bcell").forEach(el => {
      const er = +el.dataset.row, ec = +el.dataset.col;
      if (er === r && ec === c) el.classList.add("hl-cross");
      else if (er === r || ec === c) el.classList.add("hl-line");
    });
  }

  for (let r = 0; r <= ONSETS.length; r++) {
    for (let c = 0; c <= RIMES.length; c++) {
      const cell = document.createElement("div");
      cell.className = "bcell";
      cell.dataset.row = r; cell.dataset.col = c;
      if (r === 0 && c === 0) { cell.classList.add("corner"); cell.textContent = "+"; }
      else if (r === 0) { cell.classList.add("head"); cell.textContent = "-" + RIMES[c-1]; }
      else if (c === 0) { cell.classList.add("head"); cell.textContent = ONSETS[r-1]; }
      else {
        const w = ONSETS[r-1] + RIMES[c-1];
        if (REAL_WORDS.has(w)) {
          cell.classList.add("word");
          cell.dataset.word = w;
          cell.innerHTML = (WORD_EMOJI[w] ? '<span class="bword-emoji">' + WORD_EMOJI[w] + '</span>' : '') + w;
        } else {
          cell.classList.add("void");
          cell.textContent = "·";
        }
      }
      blendGrid.appendChild(cell);
    }
  }

  blendGrid.addEventListener("mouseover", (e) => {
    const cell = e.target.closest(".bcell");
    if (!cell || cell.classList.contains("corner")) return;
    bHighlight(+cell.dataset.row, +cell.dataset.col);
  });
  blendGrid.addEventListener("mouseleave", bClear);
  blendGrid.addEventListener("click", (e) => {
    const cell = e.target.closest(".bcell.word");
    if (!cell) return;
    if (document.body.classList.contains("blend-hide")) {
      if (cell.classList.contains("revealed")) { cell.classList.remove("revealed"); return; }
      cell.classList.add("revealed");
    }
    playAudio("word:" + cell.dataset.word, cell.dataset.word, cell);
  });

  const btnBlendHide = document.getElementById("btnBlendHide");
  btnBlendHide.addEventListener("click", () => {
    const hidden = document.body.classList.toggle("blend-hide");
    btnBlendHide.classList.toggle("active", hidden);
    btnBlendHide.textContent = hidden ? "👀 全部显示" : "🙈 盖住考考我";
    blendGrid.querySelectorAll(".bcell.word.revealed").forEach(c => c.classList.remove("revealed"));
  });

  // ============ Game：听音闯关 ============
  const ALL_WORDS = [...REAL_WORDS];
  const field = document.getElementById("field");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlayMsg = document.getElementById("overlayMsg");
  const overlayButtons = document.getElementById("overlayButtons");
  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const levelEl = document.getElementById("level");
  const timerEl = document.getElementById("timer");
  const timerChip = timerEl.parentElement;
  const targetEmoji = document.getElementById("targetEmoji");
  const btnStart = document.getElementById("btnStart");
  const btnPause = document.getElementById("btnPause");
  const btnReset = document.getElementById("btnReset");
  const btnReplay = document.getElementById("btnReplay");
  const cfgConcurrent = document.getElementById("cfgConcurrent");
  const cfgFamily = document.getElementById("cfgFamily");

  // 词族下拉
  RIMES.forEach(rm => {
    const opt = document.createElement("option");
    opt.value = rm; opt.textContent = "-" + rm + " 族";
    cfgFamily.appendChild(opt);
  });

  const COLORS = ["#fab1a0","#ffeaa7","#a8e6cf","#81ecec","#74b9ff","#a29bfe","#fd79a8","#ffd86b","#55efc4"];
  const ROUND_DURATION = 60;
  const cfg = { maxConcurrent: 3, family: "all" };
  cfgConcurrent.addEventListener("change", () => cfg.maxConcurrent = parseInt(cfgConcurrent.value, 10));
  cfgFamily.addEventListener("change", () => cfg.family = cfgFamily.value);

  function wordPool() {
    if (cfg.family === "all") return ALL_WORDS;
    const pool = ALL_WORDS.filter(w => w.endsWith(cfg.family));
    return pool.length ? pool : ALL_WORDS;
  }

  const state = {
    running: false, paused: false, score: 0, roundScore: 0, lives: 3, level: 1,
    cards: [], spawnTimer: 0, spawnInterval: 1.8, roundTime: ROUND_DURATION, lastTime: 0,
    target: null,
  };

  function computeSpawnInterval(level) { return Math.max(0.7, 1.8 - (level - 1) * 0.16); }

  function updateStats() {
    scoreEl.textContent = state.score;
    livesEl.textContent = "❤".repeat(Math.max(state.lives, 0)) || "0";
    levelEl.textContent = state.level;
    const t = Math.max(0, Math.ceil(state.roundTime));
    timerEl.textContent = t;
    timerChip.classList.toggle("timer-danger", t <= 10 && state.running);
    timerChip.classList.toggle("timer-warn", t > 10 && t <= 20 && state.running);
  }

  function showOverlay(title, msg, buttons) {
    overlayTitle.textContent = title; overlayMsg.textContent = msg; overlayButtons.innerHTML = "";
    buttons.forEach(b => {
      const btn = document.createElement("button");
      btn.textContent = b.label;
      if (b.variant) btn.classList.add(b.variant);
      btn.addEventListener("click", b.onClick);
      overlayButtons.appendChild(btn);
    });
    overlay.style.display = "flex";
  }
  function hideOverlay() { overlay.style.display = "none"; }

  function clearCards() { state.cards.forEach(c => c.el.remove()); state.cards = []; }

  function newTarget(speakIt) {
    const pool = wordPool();
    let w;
    do { w = pool[Math.floor(Math.random() * pool.length)]; } while (pool.length > 1 && w === state.target);
    state.target = w;
    targetEmoji.textContent = WORD_EMOJI[w] || "🔊";
    if (speakIt) playAudio("word:" + w, w);
  }

  function spawnCard() {
    const pool = wordPool();
    // 保证场上总有一张目标卡；否则随机一个干扰词
    const hasTarget = state.cards.some(c => c.word === state.target);
    let w;
    if (!hasTarget) w = state.target;
    else { do { w = pool[Math.floor(Math.random() * pool.length)]; } while (pool.length > 1 && w === state.target && Math.random() < 0.7); }

    const el = document.createElement("div");
    el.className = "falling-card";
    el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
    el.textContent = w;
    el.style.top = "-10vh"; el.style.left = "0px";
    field.appendChild(el);
    const fw = field.clientWidth;
    const cw = el.offsetWidth;
    const x = Math.random() * Math.max(fw - cw - 10, 10) + 5;
    el.style.left = x + "px";
    const vy = 38 + state.level * 7 + Math.random() * 16;
    const card = { el, word: w, y: -el.offsetHeight, vy };
    el.addEventListener("click", () => onCardClick(card));
    state.cards.push(card);
  }

  function explodeCard(card) {
    const rect = card.el.getBoundingClientRect();
    const fr = field.getBoundingClientRect();
    const expl = document.createElement("div");
    expl.className = "explosion";
    expl.style.left = (rect.left - fr.left) + "px";
    expl.style.top = (rect.top - fr.top) + "px";
    expl.style.width = rect.width + "px";
    expl.style.height = rect.height + "px";
    const at = document.createElement("div");
    at.className = "answer-text"; at.textContent = card.word;
    expl.appendChild(at);
    const N = 16;
    for (let i = 0; i < N; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.background = COLORS[i % COLORS.length];
      const ang = (i / N) * Math.PI * 2, dist = 70 + Math.random() * 70;
      p.style.setProperty("--dx", Math.cos(ang) * dist + "px");
      p.style.setProperty("--dy", Math.sin(ang) * dist + "px");
      p.style.left = "50%"; p.style.top = "50%"; p.style.marginLeft = "-0.7vh"; p.style.marginTop = "-0.7vh";
      expl.appendChild(p);
    }
    field.appendChild(expl);
    setTimeout(() => expl.remove(), 1400);
    card.el.remove();
    state.cards = state.cards.filter(c => c !== card);
  }

  function onCardClick(card) {
    if (!state.running || state.paused) return;
    if (card.word === state.target) {
      explodeCard(card);
      playAudio("word:" + card.word, card.word);
      state.score += 10; state.roundScore += 10;
      updateStats();
      newTarget(true);
    } else {
      card.el.classList.add("wrong");
      setTimeout(() => card.el.classList.remove("wrong"), 400);
    }
  }

  function loseLifeTargetMissed() {
    state.lives--;
    updateStats();
    if (state.lives <= 0) { roundFailed(); return; }
    newTarget(true);
  }

  function startRound() {
    clearCards();
    state.lives = 3; state.roundScore = 0; state.roundTime = ROUND_DURATION;
    state.spawnInterval = computeSpawnInterval(state.level);
    state.spawnTimer = state.spawnInterval;
    state.running = true; state.paused = false; state.lastTime = performance.now();
    btnPause.textContent = "⏸ 暂停";
    hideOverlay();
    newTarget(true);
    updateStats();
    requestAnimationFrame(tick);
  }
  function resetState() {
    clearCards();
    state.score = 0; state.roundScore = 0; state.lives = 3; state.level = 1;
    state.running = false; state.paused = false; state.roundTime = ROUND_DURATION;
    updateStats();
  }
  function startNewGame() { resetState(); startRound(); }
  function nextLevel() { state.level++; startRound(); }

  function roundComplete() {
    state.running = false; clearCards(); updateStats();
    showOverlay("🎉 本关通过！",
      "本关得到 " + state.roundScore + " 分，累计 " + state.score + " 分。挑战第 " + (state.level + 1) + " 关吗？",
      [
        { label: "▶ 进入第 " + (state.level + 1) + " 关", onClick: nextLevel },
        { label: "🔄 再玩本关", variant: "secondary", onClick: startRound },
        { label: "← 从头开始", variant: "tertiary", onClick: showStartScreen },
      ]);
  }
  function roundFailed() {
    state.running = false; clearCards(); updateStats();
    showOverlay("💥 生命用完啦！",
      "本关得到 " + state.roundScore + " 分，累计 " + state.score + " 分。再来一次吗？",
      [
        { label: "🔄 再玩本关", onClick: startRound },
        { label: "← 从头开始", variant: "secondary", onClick: showStartScreen },
      ]);
  }
  function showStartScreen() {
    resetState();
    showOverlay("准备好了吗？",
      "听一个单词（点 🔊 再听一次），从掉下来的卡片里点出对的那个就会爆炸！",
      [ { label: "▶ 开始游戏", onClick: startNewGame } ]);
  }

  function tick(now) {
    if (!state.running) return;
    if (state.paused) { state.lastTime = now; requestAnimationFrame(tick); return; }
    const dt = Math.min(0.05, (now - state.lastTime) / 1000);
    state.lastTime = now;

    state.roundTime -= dt;
    if (state.roundTime <= 0) { state.roundTime = 0; updateStats(); roundComplete(); return; }

    state.spawnTimer += dt;
    if (state.spawnTimer >= state.spawnInterval && state.cards.length < cfg.maxConcurrent) {
      state.spawnTimer = 0; spawnCard();
    }

    const fh = field.clientHeight;
    for (let i = state.cards.length - 1; i >= 0; i--) {
      const c = state.cards[i];
      c.y += c.vy * dt;
      c.el.style.top = c.y + "px";
      if (c.y > fh * 0.7) c.el.classList.add("glow"); else c.el.classList.remove("glow");
      if (c.y > fh) {
        const wasTarget = c.word === state.target;
        c.el.remove();
        state.cards = state.cards.filter(x => x !== c);
        if (wasTarget) { loseLifeTargetMissed(); }
      }
    }
    updateStats();
    requestAnimationFrame(tick);
  }

  btnReplay.addEventListener("click", () => { if (state.target) playAudio("word:" + state.target, state.target); });
  btnStart.addEventListener("click", () => {
    if (state.running) return;
    if (state.level === 1 && state.score === 0) startNewGame(); else startRound();
  });
  btnPause.addEventListener("click", () => {
    if (!state.running) return;
    state.paused = !state.paused;
    btnPause.textContent = state.paused ? "▶ 继续" : "⏸ 暂停";
    if (!state.paused) { state.lastTime = performance.now(); requestAnimationFrame(tick); }
  });
  btnReset.addEventListener("click", showStartScreen);

  showStartScreen();
</script>
</body>
</html>
