<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 键盘小英雄</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --u: 52px;
  --gap: 5px;
  --r: 9px;
  --ks: 0 4px 0 #b0bec5, 0 6px 10px rgba(0,0,0,0.12);
  --ks-p: 0 1px 0 #b0bec5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background: linear-gradient(160deg,#e8f4fd 0%,#fce4f5 40%,#e8fce8 80%,#fff9e6 100%);
  font-family:'Nunito',sans-serif;
  user-select:none; overflow-x:hidden;
}

/* ── TOP BAR ── */
#topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);
  border-bottom:2px solid rgba(255,255,255,0.9);
  position:sticky; top:0; z-index:100;
  flex-wrap:wrap; gap:8px;
}
.logo {
  font-family:'Fredoka One',cursive; font-size:1.5rem;
  background:linear-gradient(90deg,#f97316,#ec4899,#8b5cf6,#3b82f6);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; background-size:300%; white-space:nowrap;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.mode-tabs { display:flex; gap:6px; flex-wrap:wrap; }
.tab-btn {
  font-family:'Fredoka One',cursive; font-size:0.88rem;
  padding:6px 15px; border:2px solid #e2e8f0;
  border-radius:30px; background:white; color:#94a3b8;
  cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.tab-btn.active {
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-color:transparent; color:white;
  box-shadow:0 4px 14px rgba(99,102,241,.4);
}
.hud { display:flex; gap:10px; align-items:center; }
.hud-box {
  display:flex; flex-direction:column; align-items:center;
  background:white; border-radius:12px; padding:3px 12px;
  box-shadow:0 2px 8px rgba(0,0,0,.07); min-width:60px;
}
.hud-lbl { font-size:0.5rem; letter-spacing:2px; color:#94a3b8; text-transform:uppercase; }
.hud-val { font-family:'Fredoka One',cursive; font-size:1.15rem; color:#1e293b; }
#hist-btn, #finger-btn {
  font-family:'Fredoka One',cursive; font-size:0.85rem;
  padding:6px 13px; background:#f8fafc; border:2px solid #e2e8f0;
  border-radius:20px; cursor:pointer; color:#64748b; transition:all .2s;
  white-space:nowrap;
}
#hist-btn:hover,#finger-btn:hover{background:#e2e8f0;}
#finger-btn.on{background:#fef3c7;border-color:#fbbf24;color:#92400e;}

/* ── GAME ZONE ── */
#game-zone {
  display:flex; flex-direction:column; align-items:center;
  padding:14px 0 10px; gap:10px;
}
#target-row { display:flex; align-items:center; gap:18px; }
#mascot {
  font-size:2.8rem;
  animation:mfloat 2.2s ease-in-out infinite;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.15));
  transition:transform .1s;
}
@keyframes mfloat{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-10px) rotate(4deg);}}
#mascot.cheer{animation:mcheer .55s ease!important;}
@keyframes mcheer{0%{transform:scale(1);}35%{transform:scale(1.7) rotate(-12deg);}65%{transform:scale(1.3) rotate(10deg);}100%{transform:scale(1) rotate(0);}}
#mascot.sad{animation:msad .4s ease!important;}
@keyframes msad{0%,100%{transform:rotate(0);}25%{transform:rotate(-8deg);}75%{transform:rotate(8deg);}}

#target-card {
  background:white; border-radius:22px; padding:12px 32px;
  box-shadow:0 8px 32px rgba(0,0,0,.1); text-align:center; min-width:170px;
}
#tgt-label { font-size:0.65rem; font-weight:900; letter-spacing:3px; color:#94a3b8; text-transform:uppercase; margin-bottom:2px; }
#tgt-letter {
  font-family:'Fredoka One',cursive; font-size:4.5rem; line-height:1.1;
  animation:lpop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes lpop{from{transform:scale(.2) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
#tgt-hint { font-size:0.78rem; color:#94a3b8; font-weight:700; margin-top:2px; min-height:18px; }

/* Word display */
#word-row {
  display:flex; gap:7px; align-items:center;
  font-family:'Fredoka One',cursive; font-size:2.2rem;
  min-height:60px;
}
.wch {
  width:52px; height:52px; display:flex; align-items:center; justify-content:center;
  border-radius:12px; transition:all .2s;
}
.wch.done{background:#dcfce7;color:#16a34a;}
.wch.cur {background:#fef9c3;color:#ca8a04;transform:scale(1.18);box-shadow:0 4px 14px rgba(202,138,4,.3);}
.wch.pend{background:#f1f5f9;color:#cbd5e1;}

/* Progress dots */
#prog-row { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; max-width:580px; }
.pdot {
  width:20px; height:20px; border-radius:50%; background:#e2e8f0;
  display:flex; align-items:center; justify-content:center;
  font-size:.5rem; font-weight:900; color:#94a3b8; transition:all .3s;
}
.pdot.done{background:#4ade80;color:white;}
.pdot.cur{background:#fbbf24;color:white;transform:scale(1.35);}

/* Hint countdown bar */
#hint-bar-wrap{width:200px;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:2px;}
#hint-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);width:100%;transition:width .1s linear;}

/* ── KEYBOARD ── */
#kb-outer { width:100%; padding:0 10px 12px; display:flex; justify-content:center; }
#kb-container {
  display:flex; gap:calc(var(--u)*.55); align-items:flex-start;
  transform-origin:top center;
}
#kb-main { display:flex; flex-direction:column; gap:var(--gap); }
.kb-row { display:flex; gap:var(--gap); align-items:flex-end; }

/* ── KEY BASE ── */
.key {
  height:var(--u); width:var(--u);
  border-radius:var(--r);
  background:white; box-shadow:var(--ks);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; border:2px solid #f1f5f9;
  transition:transform .08s,box-shadow .08s,background .15s,border-color .15s;
  flex-shrink:0;
}
.km { font-family:'Fredoka One',cursive; font-size:calc(var(--u)*.34); color:#1e293b; line-height:1; }
.ks { font-size:calc(var(--u)*.19); color:#94a3b8; line-height:1; margin-bottom:1px; }
.key.letter .km { font-size:calc(var(--u)*.42); font-weight:900; }
.key.fn { background:#f8fafc; }
.key.fn .km { font-size:calc(var(--u)*.26); color:#64748b; }
.key.mod { background:#f1f5f9; }
.key.mod .km { font-size:calc(var(--u)*.24); color:#475569; }
.key.spc { background:#f8fafc; }
.key.spacer { background:transparent!important; border:none!important; box-shadow:none!important; pointer-events:none; }

/* ── FINGER COLORS (hidden unless .show-fingers) ── */
body:not(.show-fingers) .key { border-top-color:#f1f5f9!important; }
.fL5{border-top:3px solid #a855f7!important;} /* left pinky */
.fL4{border-top:3px solid #3b82f6!important;} /* left ring */
.fL3{border-top:3px solid #06b6d4!important;} /* left middle */
.fL2{border-top:3px solid #22c55e!important;} /* left index */
.fR2{border-top:3px solid #84cc16!important;} /* right index */
.fR3{border-top:3px solid #f97316!important;} /* right middle */
.fR4{border-top:3px solid #ef4444!important;} /* right ring */
.fR5{border-top:3px solid #ec4899!important;} /* right pinky */
.fTH{border-top:3px solid #94a3b8!important;} /* thumbs */

/* ── KEY STATES ── */
.key.target {
  background:linear-gradient(135deg,#fde68a,#fbbf24)!important;
  border-color:#f59e0b!important;
  box-shadow:0 0 0 3px rgba(251,191,36,.45), 0 4px 0 #d97706, 0 10px 25px rgba(251,191,36,.55)!important;
  animation:kpulse .75s ease-in-out infinite alternate;
  z-index:2;
}
@keyframes kpulse{from{transform:scale(1);}to{transform:scale(1.1);}}
.key.correct {
  background:linear-gradient(135deg,#86efac,#4ade80)!important;
  border-color:#22c55e!important;
  box-shadow:var(--ks-p)!important;
  transform:translateY(3px)!important; animation:none!important;
}
.key.wrong {
  background:linear-gradient(135deg,#fca5a5,#f87171)!important;
  border-color:#ef4444!important; animation:kshake .35s ease!important;
}
@keyframes kshake{0%,100%{transform:translateX(0);}30%{transform:translateX(-5px);}70%{transform:translateX(5px);}}
.key.pressed { transform:translateY(3px); box-shadow:var(--ks-p); }

/* ── NAV CLUSTER ── */
#kb-nav {
  display:grid;
  grid-template-columns:repeat(3,var(--u));
  grid-template-rows:repeat(6,var(--u));
  gap:var(--gap); align-content:start;
}
/* ── NUMPAD ── */
#kb-numpad {
  display:grid;
  grid-template-columns:repeat(4,var(--u));
  grid-template-rows:repeat(5,var(--u));
  gap:var(--gap); align-content:start;
}
.key.tall { height:calc(var(--u)*2 + var(--gap)); }
.key.wide { width:calc(var(--u)*2 + var(--gap)); }

/* ── FINGER LEGEND ── */
#flgnd {
  display:none; position:fixed; bottom:14px; right:14px; z-index:60;
  background:white; border-radius:16px; padding:12px 14px;
  box-shadow:0 4px 20px rgba(0,0,0,.1); font-size:.72rem;
  border:2px solid #e2e8f0;
}
body.show-fingers #flgnd{display:block;}
.fli{display:flex;align-items:center;gap:7px;margin-bottom:5px;color:#475569;}
.fli:last-child{margin-bottom:0;}
.fldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── HISTORY MODAL ── */
#hist-modal {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.5); backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
}
#hist-modal.open{display:flex;}
.hcard {
  background:white; border-radius:24px; padding:26px 30px;
  max-width:580px; width:92%; max-height:88vh; overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.28);
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes mpop{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.hcard::-webkit-scrollbar{width:4px;}
.hcard::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px;}
.h-top {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.h-top h2{font-family:'Fredoka One',cursive;font-size:1.45rem;color:#1e293b;}
.close-btn {
  background:#f1f5f9;border:none;border-radius:50%;
  width:34px;height:34px;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
}
.hrec {
  display:grid; grid-template-columns:auto 1fr auto auto;
  align-items:center; gap:10px;
  padding:10px 14px; border-radius:12px;
  margin-bottom:8px; background:#f8fafc; border:1.5px solid #e2e8f0;
}
.hrec.best{background:#fffbeb;border-color:#fbbf24;}
.hrec-medal{font-size:1.3rem;}
.hrec-info{display:flex;flex-direction:column;gap:2px;}
.hrec-mode{font-family:'Fredoka One',cursive;font-size:.95rem;color:#1e293b;}
.hrec-date{font-size:.72rem;color:#94a3b8;}
.hrec-time{font-family:'Fredoka One',cursive;font-size:1.05rem;color:#6366f1;text-align:right;}
.hrec-score{font-family:'Fredoka One',cursive;font-size:.95rem;color:#f59e0b;text-align:right;}
.no-rec{text-align:center;color:#94a3b8;padding:28px 0;font-size:.95rem;}

/* chart */
#hist-chart-wrap{margin-top:16px;}
#hist-chart-wrap h3{font-family:'Fredoka One',cursive;font-size:1rem;color:#475569;margin-bottom:8px;}
#time-chart{width:100%;height:80px;border-radius:10px;background:#f8fafc;border:1.5px solid #e2e8f0;overflow:visible;}

/* ── CELEBRATION ── */
#celebrate {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,.45); backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
}
#celebrate.show{display:flex;}
.cel-card {
  background:white; border-radius:28px; padding:38px 56px;
  text-align:center; max-width:420px; width:90%;
  box-shadow:0 24px 80px rgba(0,0,0,.25);
  animation:mpop .5s cubic-bezier(.34,1.56,.64,1);
}
.cel-emoji{font-size:4.5rem;display:block;margin-bottom:10px;}
.cel-title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:#1e293b;margin-bottom:6px;}
.cel-score{font-family:'Fredoka One',cursive;font-size:2.8rem;color:#f59e0b;display:block;margin:6px 0;}
.cel-stats{color:#64748b;font-size:.9rem;line-height:1.8;margin-bottom:20px;}
.cel-medal{font-size:2rem;display:block;margin-bottom:8px;}
.cel-pb{color:#6366f1;font-weight:900;font-size:1rem;margin-bottom:16px;display:none;}
.cel-pb.show{display:block;}
.cel-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.cbtn {
  font-family:'Fredoka One',cursive; font-size:1.05rem;
  padding:11px 28px; border:none; border-radius:40px; cursor:pointer; transition:transform .2s;
}
.cbtn:hover{transform:scale(1.06);}
.cbtn-p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;box-shadow:0 6px 20px rgba(99,102,241,.4);}
.cbtn-s{background:#f1f5f9;color:#64748b;}

#confetti-c{position:fixed;inset:0;pointer-events:none;z-index:295;}

/* ── INTRO SCREEN ── */
#intro {
  position:fixed; inset:0; z-index:400;
  background:linear-gradient(160deg,#e8f4fd,#fce4f5,#e8fce8,#fff9e6);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  padding:20px; overflow-y:auto;
}
.i-title {
  font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,5vw,3rem);
  text-align:center;
  background:linear-gradient(90deg,#f97316,#ec4899,#8b5cf6,#3b82f6);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; background-size:300%;
  animation:shimmer 2.5s linear infinite;
}
.i-sub{font-size:.95rem;color:#475569;text-align:center;max-width:380px;line-height:1.75;}
.i-mascot{font-size:4.5rem;animation:mfloat 2s ease-in-out infinite;}
.mcards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:700px;}
.mcard {
  background:white; border:2px solid #e2e8f0; border-radius:18px;
  padding:18px 20px; width:190px; text-align:center; cursor:pointer;
  transition:all .2s; box-shadow:0 4px 14px rgba(0,0,0,.06);
}
.mcard:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.12);}
.mcard.sel{border-color:#6366f1;background:#eef2ff;}
.mc-ico{font-size:2.2rem;display:block;margin-bottom:6px;}
.mc-title{font-family:'Fredoka One',cursive;font-size:1.05rem;color:#1e293b;margin-bottom:3px;}
.mc-desc{font-size:.75rem;color:#64748b;line-height:1.4;}
.stbtn {
  font-family:'Fredoka One',cursive; font-size:1.3rem;
  padding:14px 50px; background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none; border-radius:50px; color:white; cursor:pointer;
  box-shadow:0 8px 24px rgba(99,102,241,.45);
  animation:sblink 1.5s ease-in-out infinite; transition:transform .2s;
}
.stbtn:hover{transform:scale(1.06);}
@keyframes sblink{0%,100%{box-shadow:0 8px 24px rgba(99,102,241,.45);}50%{box-shadow:0 8px 40px rgba(99,102,241,.85);}}

/* score pop */
.spop {
  position:fixed; pointer-events:none; z-index:150;
  font-family:'Fredoka One',cursive; font-size:1.4rem;
  color:#f59e0b; text-shadow:0 2px 8px rgba(245,158,11,.4);
  animation:spopfly 1s ease forwards;
}
@keyframes spopfly{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-80px) scale(.8);opacity:0;}}
</style>
</head>
<body>

<canvas id="confetti-c"></canvas>

<!-- ── INTRO ── -->
<div id="intro">
  <div class="i-mascot">🚀</div>
  <div class="i-title">🌈 键盘小英雄</div>
  <p class="i-sub">选一个模式开始练习！<br>每次完成都会记录时间，看着自己越来越厉害！</p>
  <div class="mcards">
    <div class="mcard sel" data-mode="seq" onclick="selectMode(this)">
      <span class="mc-ico">📚</span>
      <div class="mc-title">A→Z 顺序</div>
      <div class="mc-desc">按顺序从A打到Z，键盘上会亮灯提示，最适合入门！</div>
    </div>
    <div class="mcard" data-mode="rnd" onclick="selectMode(this)">
      <span class="mc-ico">🎲</span>
      <div class="mc-title">随机挑战</div>
      <div class="mc-desc">26个字母随机顺序出现，完成后统计用时！</div>
    </div>
    <div class="mcard" data-mode="word" onclick="selectMode(this)">
      <span class="mc-ico">📝</span>
      <div class="mc-title">单词练习</div>
      <div class="mc-desc">拼写简单英语单词，还会朗读哦！</div>
    </div>
  </div>
  <p style="font-size:.85rem;color:#94a3b8;text-align:center;">💡 小提示：打开电脑音量，可以听到字母发音！</p>
  <button class="stbtn" onclick="launchGame()">▶ 开始！</button>
</div>

<!-- ── TOP BAR ── -->
<div id="topbar">
  <div class="logo">🌈 键盘小英雄</div>
  <div class="mode-tabs">
    <button class="tab-btn active" onclick="switchMode('seq')">📚 A→Z</button>
    <button class="tab-btn" onclick="switchMode('rnd')">🎲 随机</button>
    <button class="tab-btn" onclick="switchMode('word')">📝 单词</button>
  </div>
  <div class="hud">
    <div class="hud-box"><span class="hud-lbl">⭐ 得分</span><span class="hud-val" id="hud-score">0</span></div>
    <div class="hud-box"><span class="hud-lbl">⏱ 用时</span><span class="hud-val" id="hud-time">0:00</span></div>
    <div class="hud-box"><span class="hud-lbl">✅ 连击</span><span class="hud-val" id="hud-combo">0</span></div>
    <button id="finger-btn" onclick="toggleFingers()">🖐 指法</button>
    <button id="hist-btn" onclick="openHistory()">📊 记录</button>
  </div>
</div>

<!-- ── GAME ZONE ── -->
<div id="game-zone">
  <div id="target-row">
    <div id="mascot">🐱</div>
    <div id="target-card">
      <div id="tgt-label">请按键盘上的</div>
      <div id="tgt-letter" style="color:#6366f1">A</div>
      <div id="tgt-hint"></div>
    </div>
    <div id="word-row" style="display:none"></div>
  </div>
  <div id="hint-bar-wrap"><div id="hint-bar"></div></div>
  <div id="prog-row"></div>
</div>

<!-- ── KEYBOARD ── -->
<div id="kb-outer">
  <div id="kb-container">
    <div id="kb-main"></div>
    <div id="kb-nav"></div>
    <div id="kb-numpad"></div>
  </div>
</div>

<!-- ── FINGER LEGEND ── -->
<div id="flgnd">
  <div style="font-family:'Fredoka One',cursive;font-size:.85rem;color:#475569;margin-bottom:8px;">🖐 指法颜色</div>
  <div class="fli"><div class="fldot" style="background:#a855f7"></div>左小指</div>
  <div class="fli"><div class="fldot" style="background:#3b82f6"></div>左无名</div>
  <div class="fli"><div class="fldot" style="background:#06b6d4"></div>左中指</div>
  <div class="fli"><div class="fldot" style="background:#22c55e"></div>左食指</div>
  <div class="fli"><div class="fldot" style="background:#84cc16"></div>右食指</div>
  <div class="fli"><div class="fldot" style="background:#f97316"></div>右中指</div>
  <div class="fli"><div class="fldot" style="background:#ef4444"></div>右无名</div>
  <div class="fli"><div class="fldot" style="background:#ec4899"></div>右小指</div>
</div>

<!-- ── HISTORY MODAL ── -->
<div id="hist-modal">
  <div class="hcard">
    <div class="h-top">
      <h2>📊 历史记录</h2>
      <button class="close-btn" onclick="closeHistory()">✕</button>
    </div>
    <div id="hist-list"></div>
    <div id="hist-chart-wrap" style="display:none">
      <h3>⏱ 完成用时趋势（秒）</h3>
      <svg id="time-chart"></svg>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  KEYBOARD LAYOUT DATA
// ═══════════════════════════════════════════

// Finger assignments per letter
const FINGER = {

// Main keyboard rows: [code, mainLabel, subLabel, widthUnits*10, cssClass]

const MAIN_ROWS = [

    [null,'','',3,'spacer'],

    ['Digit1','1','!',10,''],['Digit2','2','@',10,''],['Digit3','3','#',10,''],

    ['Digit7','7','&',10,''],['Digit8','8','*',10,''],['Digit9','9','(',10,''],
    ['Digit0','0',')',10,''],['Minus','-','_',10,''],['Equal','=','+',10,''],
    ['Backspace','⌫','',20,'mod'],
  ],
  // QWERTY row
  [
    ['Tab','Tab','',15,'mod'],
    ['KeyQ','Q','',10,'letter'],['KeyW','W','',10,'letter'],
    ['KeyE','E','',10,'letter'],['KeyR','R','',10,'letter'],
    ['KeyT','T','',10,'letter'],['KeyY','Y','',10,'letter'],
    ['KeyU','U','',10,'letter'],['KeyI','I','',10,'letter'],
    ['KeyO','O','',10,'letter'],['KeyP','P','',10,'letter'],
    ['BracketLeft','[','{',10,''],['BracketRight',']','}',10,''],
    ['Backslash','\\','|',15,''],
  ],
  // ASDF row
  [
    ['CapsLock','Caps','',18,'mod'],
    ['KeyA','A','',10,'letter'],['KeyS','S','',10,'letter'],
    ['KeyD','D','',10,'letter'],['KeyF','F','',10,'letter'],
    ['KeyG','G','',10,'letter'],['KeyH','H','',10,'letter'],
    ['KeyJ','J','',10,'letter'],['KeyK','K','',10,'letter'],
    ['KeyL','L','',10,'letter'],
    ['Semicolon',';',':',10,''],["Quote","'",'"',10,''],
    ['Enter','Enter','',22,'mod'],
  ],
  // ZXCV row
  [

    ['KeyM','M','',10,'letter'],
    ['Comma',',','<',10,''],['Period','.','>',10,''],['Slash','/','?',10,''],
    ['ShiftRight','Shift','',27,'mod'],
  ],
  // Bottom row
  [
    ['ControlLeft','Ctrl','',12,'mod'],
    ['MetaLeft','⊞','',12,'mod'],

    ['Space','','',66,'spc'],
    ['AltRight','Alt','',12,'mod'],
    ['MetaRight','⊞','',12,'mod'],

    ['ControlRight','Ctrl','',12,'mod'],
  ],

// Nav cluster: [code, label, gridColumn, gridRow]
const NAV_KEYS = [
  ['PrintScreen','PrtSc',1,1],['ScrollLock','ScrLk',2,1],['Pause','Pause',3,1],
  ['Insert','Ins',1,2],['Home','Home',2,2],['PageUp','PgUp',3,2],
  ['Delete','Del',1,3],['End','End',2,3],['PageDown','PgDn',3,3],
  ['ArrowUp','↑',2,5],
  ['ArrowLeft','←',1,6],['ArrowDown','↓',2,6],['ArrowRight','→',3,6],
];

// Numpad: [code, label, col, row, extraClass]
const NUM_KEYS = [
  ['NumLock','NumLk',1,1,''],['NumpadDivide','/',2,1,''],
  ['NumpadMultiply','×',3,1,''],['NumpadSubtract','−',4,1,''],
  ['Numpad7','7',1,2,''],['Numpad8','8',2,2,''],['Numpad9','9',3,2,''],
  ['NumpadAdd','+',4,2,'tall'],   // spans rows 2-3
  ['Numpad4','4',1,3,''],['Numpad5','5',2,3,''],['Numpad6','6',3,3,''],
  ['Numpad1','1',1,4,''],['Numpad2','2',2,4,''],['Numpad3','3',3,4,''],
  ['NumpadEnter','↵',4,4,'tall'], // spans rows 4-5
  ['Numpad0','0',1,5,'wide'],     // spans cols 1-2
  ['NumpadDecimal','.',3,5,''],

// Letter → key color
const LC = ['#f87171','#fb923c','#fbbf24','#a3e635','#34d399',
            '#22d3ee','#60a5fa','#818cf8','#c084fc','#f472b6'];
function lColor(l){ return LC[(l.charCodeAt(0)-65)%LC.length]; }

// ═══════════════════════════════════════════
//  WORDS LIST
// ═══════════════════════════════════════════
const WORDS = [
  'CAT','DOG','SUN','HAT','CUP','BIG','RED','BUS','MAP','ANT',
  'BAT','COW','EGG','FAN','HEN','JAM','LEG','NET','PAW','RAT',
  'TUB','VAN','ZIP','BEE','FLY','OWL','APE','FOX','JOY','KEY',
  'FROG','BIRD','FISH','BEAR','DUCK','WOLF','DEER','CAKE','BALL',
  'BOOK','TREE','STAR','MOON','RAIN','SNOW','FIRE','WIND','BOAT',
  'SHIP','BIKE','JUMP','PLAY','SING','SWIM','CLAP','FROG','GLAD',
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let mode='seq';
let gameActive=false;
let score=0, combo=0, startTime=0, timerRaf=null;
let seqLetters=[], seqIdx=0;
let currentTarget='';      // single letter
let wordList=[], wordIdx=0, charIdx=0;
let hintTimer=null, hintProgress=1;
let hintRunning=false;

// ═══════════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════════
let enVoice=null;
function initVoice(){
  const vs=speechSynthesis.getVoices();
  const pref=['Samantha','Karen','Daniel','Google US English','Microsoft Zira'];
  enVoice=pref.reduce((f,n)=>f||vs.find(v=>v.name.includes(n)&&v.lang.startsWith('en')),null)
    ||vs.find(v=>v.lang.startsWith('en-'))||vs[0];
}
speechSynthesis.onvoiceschanged=initVoice; initVoice();
function speak(text, rate=0.85, pitch=1.3){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=rate; u.pitch=pitch; u.volume=1;
  if(enVoice) u.voice=enVoice;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════
let aC;
function beep(type){
  try{
    if(!aC) aC=new(window.AudioContext||window.webkitAudioContext)();
    const tone=(f,t,d,v=0.2)=>{
      const o=aC.createOscillator(),g=aC.createGain();
      o.connect(g);g.connect(aC.destination);
      o.frequency.setValueAtTime(f,aC.currentTime+t);
      g.gain.setValueAtTime(v,aC.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,aC.currentTime+t+d);
      o.start(aC.currentTime+t);o.stop(aC.currentTime+t+d);
    };
    if(type==='hit'){tone(440,0,.07);tone(660,.06,.1);tone(880,.13,.3);}
    if(type==='err'){tone(200,0,.12,.18);tone(150,.1,.25,.18);}
    if(type==='yay'){[523,659,784,1047].forEach((f,i)=>tone(f,i*.08,.25,.2));}
  }catch(e){}
}

// ═══════════════════════════════════════════
//  BUILD KEYBOARD DOM
// ═══════════════════════════════════════════
function buildKeyboard(){
  const main=document.getElementById('kb-main');
  main.innerHTML='';
  MAIN_ROWS.forEach(rowData=>{
    const row=document.createElement('div');
    row.className='kb-row';
    rowData.forEach(([code,lbl,sub,w,tp])=>{
      const key=document.createElement('div');
      const baseW=`calc(var(--u)*${w/10})`;
      key.style.width=baseW;
      let cls='key '+(tp||'');
      if(code&&/^Key[A-Z]$/.test(code)){
        const letter=code[3];
        cls+=' '+( FINGER[letter]||'');
      }
      key.className=cls.trim();
      if(code) key.dataset.code=code;
      if(lbl){
        const km=document.createElement('span');
        km.className='km'; km.textContent=lbl;
        key.appendChild(km);
      }
      if(sub){
        const ks=document.createElement('span');
        ks.className='ks'; ks.textContent=sub;
        key.insertBefore(ks,key.firstChild);
      }
      row.appendChild(key);
    });
    main.appendChild(row);
  });

  // Nav cluster
  const nav=document.getElementById('kb-nav');
  nav.innerHTML='';
  NAV_KEYS.forEach(([code,lbl,col,row])=>{
    const key=document.createElement('div');
    key.className='key fn';
    key.dataset.code=code;
    key.style.gridColumn=col;
    key.style.gridRow=row;
    const km=document.createElement('span');
    km.className='km'; km.textContent=lbl;
    key.appendChild(km);
    nav.appendChild(key);
  });

  // Numpad
  const np=document.getElementById('kb-numpad');
  np.innerHTML='';
  NUM_KEYS.forEach(([code,lbl,col,row,extra])=>{
    const key=document.createElement('div');
    key.className='key '+(extra||'');
    key.dataset.code=code;
    key.style.gridColumn=extra==='wide'?`${col}/${col+2}`:col;
    key.style.gridRow=extra==='tall'?`${row}/${row+2}`:row;
    const km=document.createElement('span');
    km.className='km'; km.textContent=lbl;
    key.appendChild(km);
    np.appendChild(key);
  });
}

// ═══════════════════════════════════════════
//  KEY HIGHLIGHT
// ═══════════════════════════════════════════
function keyEl(code){
  return document.querySelector(`.key[data-code="${code}"]`);
}
function clearTargetKeys(){
  document.querySelectorAll('.key.target').forEach(k=>k.classList.remove('target'));
}
function activateKey(letter){
  clearTargetKeys();
  const code='Key'+letter.toUpperCase();
  const el=keyEl(code);
  if(el) el.classList.add('target');
}
function flashKey(code,cls){
  const el=keyEl(code);
  if(!el) return;
  el.classList.remove('target');
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls), cls==='correct'?350:380);
}
function pressKey(code){
  const el=keyEl(code);
  if(!el) return;
  el.classList.add('pressed');
  setTimeout(()=>el.classList.remove('pressed'),130);
}

// ═══════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════
function startTimer(){
  startTime=Date.now();
  function tick(){
    const s=Math.floor((Date.now()-startTime)/1000);
    const m=Math.floor(s/60), ss=s%60;
    document.getElementById('hud-time').textContent=`${m}:${ss.toString().padStart(2,'0')}`;
    timerRaf=requestAnimationFrame(tick);
  }
  tick();
}
function stopTimer(){ cancelAnimationFrame(timerRaf); }
function elapsedSec(){ return (Date.now()-startTime)/1000; }

// ═══════════════════════════════════════════
//  HINT SYSTEM (glow intensifies after 3s)
// ═══════════════════════════════════════════
function startHint(){
  stopHint();
  hintProgress=1;
  const bar=document.getElementById('hint-bar');
  bar.style.width='100%';
  const t0=Date.now(), dur=3000;
  hintRunning=true;
  function tick(){
    if(!hintRunning) return;
    const p=1-Math.min((Date.now()-t0)/dur,1);
    hintProgress=p;
    bar.style.width=(p*100)+'%';
    if(p>0){ hintTimer=requestAnimationFrame(tick); }
    // hint: already handled by .target pulse — bar just shows countdown
  }
  hintTimer=requestAnimationFrame(tick);
}
function stopHint(){
  hintRunning=false;
  cancelAnimationFrame(hintTimer);
  document.getElementById('hint-bar').style.width='100%';
}

// ═══════════════════════════════════════════
//  SCORE POP
// ═══════════════════════════════════════════
function scorePop(x,y,val){
  const el=document.createElement('div');
  el.className='spop';
  el.style.left=x+'px'; el.style.top=y+'px';
  el.textContent='+'+val;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1050);
}

// ═══════════════════════════════════════════
//  PROGRESS DOTS
// ═══════════════════════════════════════════
function buildDots(letters, curIdx){
  const row=document.getElementById('prog-row');
  row.innerHTML='';
  letters.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i<curIdx?' done':i===curIdx?' cur':'');
    d.title=l;
    d.textContent=l;
    row.appendChild(d);
  });
}
function advanceDot(idx){
  const dots=document.querySelectorAll('.pdot');
  dots.forEach((d,i)=>{
    d.className='pdot'+(i<idx?' done':i===idx?' cur':'');
  });
}

// ═══════════════════════════════════════════
//  MODE: SEQUENTIAL
// ═══════════════════════════════════════════
function startSeq(){
  seqLetters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  seqIdx=0;
  buildDots(seqLetters,0);
  document.getElementById('word-row').style.display='none';
  document.getElementById('tgt-label').textContent='请按键盘上的';
  showSeqTarget();
  startTimer();
}
function showSeqTarget(){
  const l=seqLetters[seqIdx];
  currentTarget=l;
  const tl=document.getElementById('tgt-letter');
  tl.textContent=l;
  tl.style.color=lColor(l);
  tl.style.animation='none'; tl.offsetWidth; tl.style.animation='lpop .4s cubic-bezier(.34,1.56,.64,1)';
  document.getElementById('tgt-hint').textContent='第 '+(seqIdx+1)+' / 26 个';
  activateKey(l);
  startHint();
  speak(l);
}
function seqCorrect(letter){
  flashKey('Key'+letter, 'correct');
  stopHint();
  combo++;
  const pts=10+Math.min(combo-1,5)*3+Math.round(hintProgress*8);
  score+=pts;
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-combo').textContent=combo;
  beep('hit'); speak(letter);
  const el=keyEl('Key'+letter);
  if(el){ const r=el.getBoundingClientRect(); scorePop(r.left+r.width/2,r.top,pts); }
  mascotCheer();
  seqIdx++;
  if(seqIdx>=seqLetters.length){ endRound(); return; }
  advanceDot(seqIdx);
  setTimeout(showSeqTarget,400);
}

// ═══════════════════════════════════════════
//  MODE: RANDOM
// ═══════════════════════════════════════════
let rndLetters=[], rndIdx=0;
function startRnd(){
  rndLetters=[...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'];
  for(let i=rndLetters.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [rndLetters[i],rndLetters[j]]=[rndLetters[j],rndLetters[i]];
  }
  rndIdx=0;
  buildDots(rndLetters,0);
  document.getElementById('word-row').style.display='none';
  document.getElementById('tgt-label').textContent='请按键盘上的';
  showRndTarget();
  startTimer();
}
function showRndTarget(){
  const l=rndLetters[rndIdx];
  currentTarget=l;
  const display=Math.random()<.5?l:l.toLowerCase();
  const tl=document.getElementById('tgt-letter');
  tl.textContent=display;
  tl.style.color=lColor(l);
  tl.style.animation='none'; tl.offsetWidth; tl.style.animation='lpop .4s cubic-bezier(.34,1.56,.64,1)';
  document.getElementById('tgt-hint').textContent=(display===l?'大写':'小写')+' · 第'+(rndIdx+1)+'/26';
  activateKey(l);
  startHint();
  speak(l);
}
function rndCorrect(letter){
  flashKey('Key'+letter,'correct');
  stopHint();
  combo++;
  const pts=10+Math.min(combo-1,5)*3+Math.round(hintProgress*10);
  score+=pts;
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-combo').textContent=combo;
  beep('hit'); speak(letter);
  const el=keyEl('Key'+letter);
  if(el){ const r=el.getBoundingClientRect(); scorePop(r.left+r.width/2,r.top,pts); }
  mascotCheer();
  rndIdx++;
  if(rndIdx>=rndLetters.length){ endRound(); return; }
  advanceDot(rndIdx);
  setTimeout(showRndTarget,400);
}

// ═══════════════════════════════════════════
//  MODE: WORDS
// ═══════════════════════════════════════════
let wordScore=0, wordsCompleted=0;
function startWord(){
  // pick 10 random words
  wordList=[...WORDS].sort(()=>Math.random()-.5).slice(0,10);
  wordIdx=0; charIdx=0; wordScore=0; wordsCompleted=0;
  document.getElementById('prog-row').innerHTML='';
  buildWordDots();
  document.getElementById('tgt-label').textContent='请拼写单词';
  showWordTarget();
  startTimer();
}
function buildWordDots(){
  const row=document.getElementById('prog-row');
  row.innerHTML='';
  wordList.forEach((w,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i<wordIdx?' done':i===wordIdx?' cur':'');
    d.textContent='★'; d.title=w;
    row.appendChild(d);
  });
}
function showWordTarget(){
  const word=wordList[wordIdx];
  speak(word, 0.7, 1.2); // pronounce whole word first
  document.getElementById('tgt-hint').textContent='第 '+(wordIdx+1)+' / '+wordList.length+' 个单词';

  // render word chars
  const wr=document.getElementById('word-row');
  wr.style.display='flex';
  document.getElementById('target-card').style.display='none';
  wr.innerHTML='';
  word.split('').forEach((ch,i)=>{
    const d=document.createElement('div');
    d.className='wch '+(i<charIdx?'done':i===charIdx?'cur':'pend');
    d.textContent=ch;
    d.style.color=i===charIdx?'#ca8a04':i<charIdx?'#16a34a':'#cbd5e1';
    wr.appendChild(d);
  });
  const tl=document.getElementById('tgt-letter');
  currentTarget=word[charIdx];
  tl.textContent=word[charIdx];
  tl.style.color=lColor(word[charIdx]);
  document.getElementById('target-card').style.display='';
  activateKey(word[charIdx]);
  startHint();
}
function wordCharCorrect(letter){
  const word=wordList[wordIdx];
  flashKey('Key'+letter,'correct');
  stopHint();
  combo++;
  const pts=15+Math.min(combo-1,5)*3+Math.round(hintProgress*10);
  score+=pts; wordScore+=pts;
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-combo').textContent=combo;
  beep('hit'); speak(letter);
  const el=keyEl('Key'+letter);
  if(el){ const r=el.getBoundingClientRect(); scorePop(r.left+r.width/2,r.top,pts); }
  mascotCheer();
  charIdx++;
  if(charIdx>=word.length){
    // word complete
    beep('yay');
    speak(word, 0.6, 1.3);
    wordsCompleted++;
    wordIdx++;
    charIdx=0;
    if(wordIdx>=wordList.length){ endRound(); return; }
    buildWordDots();
    setTimeout(showWordTarget, 700);
  } else {
    // update display
    const wr=document.getElementById('word-row');
    [...wr.children].forEach((d,i)=>{
      d.className='wch '+(i<charIdx?'done':i===charIdx?'cur':'pend');
    });
    currentTarget=word[charIdx];
    const tl=document.getElementById('tgt-letter');
    tl.textContent=word[charIdx];
    tl.style.color=lColor(word[charIdx]);
    tl.style.animation='none'; tl.offsetWidth; tl.style.animation='lpop .4s cubic-bezier(.34,1.56,.64,1)';
    activateKey(word[charIdx]);
    startHint();
    speak(word[charIdx]);
  }
}

// ═══════════════════════════════════════════
//  WRONG KEY
// ═══════════════════════════════════════════
function handleWrong(code){
  flashKey(code,'wrong');
  beep('err');
  combo=0;
  document.getElementById('hud-combo').textContent=0;
  mascotSad();
}

// ═══════════════════════════════════════════
//  MASCOT
// ═══════════════════════════════════════════
const MASCOTS=['🐱','🐶','🦊','🐸','🐼','🦄','🐧','🦋'];
let mascotIdx=0;
function mascotCheer(){
  const m=document.getElementById('mascot');
  m.classList.remove('cheer','sad'); m.offsetWidth; m.classList.add('cheer');
}
function mascotSad(){
  const m=document.getElementById('mascot');
  m.classList.remove('cheer','sad'); m.offsetWidth; m.classList.add('sad');
}

// ═══════════════════════════════════════════
//  KEYDOWN HANDLER
// ═══════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(e.repeat) return;
  const k=e.key.toUpperCase();
  if(!/^[A-Z]$/.test(k)) return;
  if(!gameActive) return;
  pressKey('Key'+k);
  if(k===currentTarget.toUpperCase()){
    if(mode==='seq') seqCorrect(k);
    else if(mode==='rnd') rndCorrect(k);
    else if(mode==='word') wordCharCorrect(k);
  } else {
    handleWrong('Key'+k);
  }
});

// ═══════════════════════════════════════════
//  END ROUND
// ═══════════════════════════════════════════
function endRound(){
  gameActive=false;
  stopTimer(); stopHint();
  clearTargetKeys();
  const secs=elapsedSec();
  const rec=saveRecord(mode, secs, score);
  showCelebration(secs, score, rec.isPB);
}

// ═══════════════════════════════════════════
//  CELEBRATION
// ═══════════════════════════════════════════
function getMedal(mode, secs){
  const thresholds={seq:{gold:45,silver:60},rnd:{gold:50,silver:70},word:{gold:60,silver:90}};
  const t=thresholds[mode]||{gold:60,silver:90};
  if(secs<=t.gold) return {emoji:'🥇',label:'金牌！'};
  if(secs<=t.silver) return {emoji:'🥈',label:'银牌！'};
  return {emoji:'🥉',label:'铜牌！'};
}
function showCelebration(secs, pts, isPB){
  const m=Math.floor(secs/60), s=Math.floor(secs%60);
  const medal=getMedal(mode,secs);
  const modeNames={seq:'A→Z顺序',rnd:'随机挑战',word:'单词练习'};
  document.getElementById('cel-emoji').textContent=medal.emoji==='🥇'?'🎊':'🎉';
  document.getElementById('cel-title').textContent='完成了！'+medal.label;
  document.getElementById('cel-medal').textContent=medal.emoji;
  document.getElementById('cel-score').textContent=pts+' 分';
  document.getElementById('cel-stats').innerHTML=
    `模式：${modeNames[mode]}<br>用时：${m>0?m+'分':''} ${s}秒<br>连击最高：${combo}`;
  const pb=document.getElementById('cel-pb');
  pb.style.display=isPB?'block':'none';
  document.getElementById('celebrate').classList.add('show');
  launchConfetti();
  beep('yay');
}

// ═══════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════
const cvs=document.getElementById('confetti-c');
const cctx=cvs.getContext('2d');
let cparts=[];
function launchConfetti(){
  cvs.width=innerWidth; cvs.height=innerHeight;
  const colors=['#f87171','#fb923c','#fbbf24','#4ade80','#60a5fa','#c084fc','#f472b6','#34d399'];
  for(let i=0;i<120;i++){
    cparts.push({
      x:Math.random()*innerWidth, y:-10,
      vx:(Math.random()-.5)*6, vy:Math.random()*4+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      sz:Math.random()*9+3, rot:Math.random()*360,
      rv:(Math.random()-.5)*8, life:1, dec:.012+Math.random()*.006
    });
  }
  animConf();
}
let confRaf;
function animConf(){
  cctx.clearRect(0,0,cvs.width,cvs.height);
  cparts=cparts.filter(p=>p.life>0);
  cparts.forEach(p=>{
    cctx.save(); cctx.globalAlpha=p.life;
    cctx.translate(p.x,p.y); cctx.rotate(p.rot*Math.PI/180);
    cctx.fillStyle=p.color; cctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);
    cctx.restore();
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rv; p.life-=p.dec;
  });
  if(cparts.length) confRaf=requestAnimationFrame(animConf);
  else cctx.clearRect(0,0,cvs.width,cvs.height);
}

// ═══════════════════════════════════════════
//  HISTORY  (localStorage)
// ═══════════════════════════════════════════
function loadHistory(){ try{return JSON.parse(localStorage.getItem('kbhero')||'[]');}catch(e){return[];} }
function saveRecord(mode, secs, pts){
  const hist=loadHistory();
  const modeRecs=hist.filter(r=>r.mode===mode);
  const prevBest=modeRecs.length?Math.min(...modeRecs.map(r=>r.secs)):Infinity;
  const isPB=secs<prevBest;
  hist.unshift({mode,secs:Math.round(secs*10)/10,pts,date:new Date().toLocaleDateString('zh-CN'),ts:Date.now()});
  if(hist.length>50) hist.length=50;
  localStorage.setItem('kbhero',JSON.stringify(hist));
  return {isPB};
}
function openHistory(){
  const hist=loadHistory();
  const el=document.getElementById('hist-list');
  if(!hist.length){ el.innerHTML='<div class="no-rec">还没有记录哦，快去打几轮吧！🚀</div>'; }
  else{
    const modeNames={seq:'📚 A→Z',rnd:'🎲 随机',word:'📝 单词'};
    // find best per mode
    const bests={};
    ['seq','rnd','word'].forEach(m=>{
      const mr=hist.filter(r=>r.mode===m);
      if(mr.length) bests[m]=Math.min(...mr.map(r=>r.secs));
    });
    el.innerHTML=hist.map((r,i)=>{
      const m=Math.floor(r.secs/60),s=Math.floor(r.secs%60);
      const timeStr=m>0?`${m}:${s.toString().padStart(2,'0')}`:`${s}秒`;
      const isBest=bests[r.mode]===r.secs;
      const medal=i===0&&r.mode===hist[0].mode?'🆕':isBest?'🏆':'';
      return `<div class="hrec${isBest?' best':''}">
        <div class="hrec-medal">${medal||'•'}</div>
        <div class="hrec-info"><div class="hrec-mode">${modeNames[r.mode]||r.mode}</div>
        <div class="hrec-date">${r.date}</div></div>
        <div class="hrec-time">⏱ ${timeStr}</div>
        <div class="hrec-score">⭐ ${r.pts}</div>
      </div>`;
    }).join('');
    // Draw time chart for current mode
    const modeRecs=hist.filter(r=>r.mode===mode).slice(0,10).reverse();
    if(modeRecs.length>=2){
      drawChart(modeRecs);
      document.getElementById('hist-chart-wrap').style.display='block';
    } else {
      document.getElementById('hist-chart-wrap').style.display='none';
    }
  }
  document.getElementById('hist-modal').classList.add('open');
}
function closeHistory(){ document.getElementById('hist-modal').classList.remove('open'); }

function drawChart(recs){
  const svg=document.getElementById('time-chart');
  const W=svg.parentElement.clientWidth-4, H=80;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  const vals=recs.map(r=>r.secs);
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const range=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=12+i*(W-24)/(vals.length-1);
    const y=H-10-(v-mn)/range*(H-22);
    return [x,y];
  });
  const path=pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  svg.innerHTML=`
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${path} L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z" fill="url(#lg)"/>
    <path d="${path}" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(([x,y],i)=>`
      <circle cx="${x}" cy="${y}" r="4" fill="#6366f1"/>
      <text x="${x}" y="${y-8}" text-anchor="middle" font-size="9" fill="#64748b" font-family="Nunito,sans-serif">${Math.round(vals[i])}s</text>
    `).join('')}
  `;
}

// ═══════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════
function selectMode(el){
  document.querySelectorAll('.mcard').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  mode=el.dataset.mode;
}
function launchGame(){
  document.getElementById('intro').style.display='none';
  initGameForMode();
}
function switchMode(m){
  mode=m;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  resetAndStart();
}
function initGameForMode(){
  score=0; combo=0;
  document.getElementById('hud-score').textContent='0';
  document.getElementById('hud-combo').textContent='0';
  document.getElementById('hud-time').textContent='0:00';
  document.getElementById('word-row').style.display='none';
  document.getElementById('target-card').style.display='';
  clearTargetKeys();
  gameActive=true;
  if(mode==='seq') startSeq();
  else if(mode==='rnd') startRnd();
  else startWord();
}
function resetAndStart(){
  stopTimer(); stopHint(); gameActive=false;
  document.getElementById('celebrate').classList.remove('show');
  cancelAnimationFrame(confRaf); cparts=[];
  cctx.clearRect(0,0,cvs.width,cvs.height);
  setTimeout(initGameForMode,100);
}
function nextRound(){
  document.getElementById('celebrate').classList.remove('show');
  cancelAnimationFrame(confRaf); cparts=[];
  cctx.clearRect(0,0,cvs.width,cvs.height);
  resetAndStart();
}
function changeMode(){
  document.getElementById('celebrate').classList.remove('show');
  document.getElementById('intro').style.display='flex';
}

  document.body.classList.toggle('show-fingers');
  document.getElementById('finger-btn').classList.toggle('on');
}

// ═══════════════════════════════════════════
//  RESPONSIVE SCALE
// ═══════════════════════════════════════════
function scaleKb(){
  const kb=document.getElementById('kb-container');
  const avail=window.innerWidth-20;
  // Full keyboard ≈ (15u main) + (3u nav) + (4u numpad) + 2 gaps * 0.55u = 23.1u
  const kbNatural=23.1*52; // natural width at --u=52px
  const sc=Math.min(1, avail/kbNatural);
  kb.style.transform=`scale(${sc})`;
  const natH=6*52+5*5+20; // approx keyboard height
  kb.style.marginBottom=`${natH*(sc-1)}px`;
}
window.addEventListener('resize',scaleKb);

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
buildKeyboard();
scaleKb();
